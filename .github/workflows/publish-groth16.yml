name: Publish Groth16

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.1.0)'
        required: true
        default: '0.2.1.0'

permissions:
  contents: read

concurrency:
  group: publish-groth16
  cancel-in-progress: false

env:
  NATIVE_DIR: packages/jvm/groth16/groth16_jni/javalib/src/main/resources/META-INF/native

jobs:
  # ── Step 1: Build all native libraries ──────────────────────────────────────
  build-native:
    name: Native lib · ${{ matrix.platform }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: 1

    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux
            arch: amd64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            artifact: libgroth16_jni.so
            resource-path: linux64/amd64

          - platform: linux
            arch: aarch64
            os: ubuntu-latest
            rust-target: aarch64-unknown-linux-gnu
            artifact: libgroth16_jni.so
            resource-path: linux64/aarch64
            extra-packages: gcc-aarch64-linux-gnu

          - platform: linux
            arch: x86
            os: ubuntu-latest
            rust-target: i686-unknown-linux-gnu
            artifact: libgroth16_jni.so
            resource-path: linux32/x86
            extra-packages: gcc-multilib

          - platform: osx
            arch: aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact: libgroth16_jni.dylib
            resource-path: osx64/aarch64

          - platform: osx
            arch: x86_64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            artifact: libgroth16_jni.dylib
            resource-path: osx64/x86_64

          - platform: windows
            arch: amd64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact: groth16_jni.dll
            resource-path: windows64/amd64

          - platform: windows
            arch: x86
            os: windows-latest
            rust-target: i686-pc-windows-msvc
            artifact: groth16_jni.dll
            resource-path: windows32/x86

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cross-compilation packages
        if: matrix.extra-packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.extra-packages }}

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: packages/jvm/groth16/groth16_jni

      - name: Build native library
        working-directory: packages/jvm/groth16/groth16_jni
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Stage artifact
        shell: bash
        run: |
          DEST="${{ env.NATIVE_DIR }}/${{ matrix.resource-path }}"
          mkdir -p "$DEST"
          rm -f "$DEST/.gitkeep"
          cp "packages/jvm/groth16/groth16_jni/target/${{ matrix.rust-target }}/release/${{ matrix.artifact }}" "$DEST/"

      - name: Upload native library
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-lib-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.NATIVE_DIR }}/**
          retention-days: 1

  # ── Step 2: Full audit gate + publish ───────────────────────────────────────
  publish:
    name: Audit · Sign · Upload to Central Portal
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-native
    defaults:
      run:
        working-directory: packages/jvm/groth16

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-lib-*
          merge-multiple: true
          path: ${{ env.NATIVE_DIR }}

      - name: Set up Java 25 (Temurin) + Maven Central credentials
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Set release version
        run: |
          ./mvnw --batch-mode versions:set \
            -DnewVersion=${{ inputs.version }} \
            -DgenerateBackupPoms=false

      - name: Full audit gate before release
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -n "$NVD_API_KEY" ]; then
            ./mvnw --batch-mode verify -P audit -DnvdApiKey="$NVD_API_KEY"
          else
            ./mvnw --batch-mode verify -P audit -Ddependency-check.skip=true
          fi

      - name: GPG-sign and deploy to Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          ./mvnw --batch-mode deploy -P release -DskipTests \
            -Dgpg.keyname="${{ secrets.MAVEN_GPG_KEY_ID }}"

      - name: Upload staged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zdcc-${{ inputs.version }}-staged
          path: packages/jvm/groth16/target/*.jar
          retention-days: 30
