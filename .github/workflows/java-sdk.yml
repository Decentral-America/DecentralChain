name: Java SDK CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/jvm/java-sdk/**'
      - 'packages/jvm/transactions/**'
      - 'packages/jvm/crypto/**'
      - '.github/workflows/java-sdk.yml'
  pull_request:
    paths:
      - 'packages/jvm/java-sdk/**'
      - 'packages/jvm/transactions/**'
      - 'packages/jvm/crypto/**'
      - '.github/workflows/java-sdk.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/jvm/java-sdk

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['25']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Set up SBT
        uses: sbt/setup-sbt@4ed7b7ec4bfa2074fe48554c09e341267397247c  # v1.2.0

      - name: Checkout node-scala (lang dependency)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: Decentral-America/node-scala
          path: _node-scala

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, groth16, crypto, transactions, lang)
        run: |
          MVN_OPTS="--batch-mode --no-transfer-progress -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true"
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-serialization && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519   && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst         && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/groth16      && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto       && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/transactions && ./mvnw $MVN_OPTS install)
          LANG_VERSION=$(awk -F'"' '/baseVersion/{print $2}' $GITHUB_WORKSPACE/_node-scala/version.sbt)
          (cd $GITHUB_WORKSPACE/_node-scala && sbt "set ThisBuild / version := \"$LANG_VERSION\"" lang/publishM2)

      - name: Enforce version gates + compile + test
        run: ./mvnw --batch-mode --no-transfer-progress verify -Dmaven.javadoc.skip=true -Dgpg.skip=true

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: surefire-reports-java${{ matrix.java }}
          path: packages/jvm/java-sdk/target/surefire-reports/
          retention-days: 7

  audit:
    name: Security Audit (SpotBugs + PMD + OWASP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, crypto, transactions)
        run: |
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-serialization && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519   && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst         && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto       && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/transactions && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)

      - name: Run audit profile
        working-directory: packages/jvm/java-sdk
        run: |
          ./mvnw --batch-mode --no-transfer-progress verify -P audit \
            -Ddependency-check.skip=true -Dmaven.javadoc.skip=true -Dgpg.skip=true
        # OWASP NVD dependency-check requires an API key and is slow.
        # Run it separately with the NVD_API_KEY secret when needed.

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: spotbugs-report
          path: packages/jvm/java-sdk/target/spotbugs*.xml
          retention-days: 14

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, crypto, transactions)
        run: |
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-serialization && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519   && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst         && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto       && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/transactions && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)

      - name: Build package + generate CycloneDX SBOM
        working-directory: packages/jvm/java-sdk
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: java-sdk-sbom
          path: packages/jvm/java-sdk/target/bom.json
          retention-days: 90
