name: Java SDK CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/jvm/java-sdk/**'
      - 'packages/jvm/transactions/**'
      - 'packages/jvm/crypto/**'
      - '.github/workflows/java-sdk.yml'
  pull_request:
    paths:
      - 'packages/jvm/java-sdk/**'
      - 'packages/jvm/transactions/**'
      - 'packages/jvm/crypto/**'
      - '.github/workflows/java-sdk.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/jvm/java-sdk

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        java: ['25']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Set up SBT
        uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b  # v1.2.1

      - name: Checkout node-scala (lang dependency)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          repository: Decentral-America/node-scala
          path: _node-scala

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, groth16, crypto, transactions, lang)
        run: |
          set -euo pipefail
          MVN_OPTS="--batch-mode --no-transfer-progress -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true"
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-schemas && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519   && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst         && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/groth16      && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto       && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/transactions && ./mvnw $MVN_OPTS install)
          LANG_VERSION=$(awk -F'"' '/baseVersion/{print $2}' $GITHUB_WORKSPACE/_node-scala/version.sbt)
          (cd $GITHUB_WORKSPACE/_node-scala && sbt "set ThisBuild / version := \"$LANG_VERSION\"" lang/publishM2)

      - name: Enforce version gates + compile + test
        run: ./mvnw --batch-mode --no-transfer-progress verify -Dmaven.javadoc.skip=true -Dgpg.skip=true

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: surefire-reports-java${{ matrix.java }}
          path: packages/jvm/java-sdk/target/surefire-reports/
          retention-days: 7

  audit:
    name: Security Audit (SpotBugs + PMD + OWASP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Set up SBT
        uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b  # v1.2.1

      - name: Checkout node-scala (lang dependency)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          repository: Decentral-America/node-scala
          path: _node-scala

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, groth16, crypto, transactions, lang)
        run: |
          set -euo pipefail
          MVN_OPTS="--batch-mode --no-transfer-progress -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true"
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-schemas && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519   && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst         && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/groth16      && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto       && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/transactions && ./mvnw $MVN_OPTS install)
          LANG_VERSION=$(awk -F'"' '/baseVersion/{print $2}' $GITHUB_WORKSPACE/_node-scala/version.sbt)
          (cd $GITHUB_WORKSPACE/_node-scala && sbt "set ThisBuild / version := \"$LANG_VERSION\"" lang/publishM2)

      - name: Run audit profile
        working-directory: packages/jvm/java-sdk
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail
          if [ -n "$NVD_API_KEY" ]; then
            ./mvnw --batch-mode --no-transfer-progress verify -P audit \
              -DnvdApiKey="$NVD_API_KEY" -Dmaven.javadoc.skip=true -Dgpg.skip=true
          else
            echo "::warning::NVD_API_KEY not set — OWASP dependency-check skipped, only SpotBugs+PMD ran"
            ./mvnw --batch-mode --no-transfer-progress verify -P audit \
              -Ddependency-check.skip=true -Dmaven.javadoc.skip=true -Dgpg.skip=true
          fi

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: spotbugs-report
          path: packages/jvm/java-sdk/target/spotbugs*.xml
          retention-days: 14

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Set up SBT
        uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b  # v1.2.1

      - name: Checkout node-scala (lang dependency)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          repository: Decentral-America/node-scala
          path: _node-scala

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, groth16, crypto, transactions, lang)
        run: |
          set -euo pipefail
          MVN_OPTS="--batch-mode --no-transfer-progress -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true"
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-schemas && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519   && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst         && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/groth16      && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto       && ./mvnw $MVN_OPTS install)
          (cd $GITHUB_WORKSPACE/packages/jvm/transactions && ./mvnw $MVN_OPTS install)
          LANG_VERSION=$(awk -F'"' '/baseVersion/{print $2}' $GITHUB_WORKSPACE/_node-scala/version.sbt)
          (cd $GITHUB_WORKSPACE/_node-scala && sbt "set ThisBuild / version := \"$LANG_VERSION\"" lang/publishM2)

      - name: Build package + generate CycloneDX SBOM
        working-directory: packages/jvm/java-sdk
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: java-sdk-sbom
          path: packages/jvm/java-sdk/target/bom.json
          retention-days: 90
