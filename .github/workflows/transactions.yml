name: Transactions CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/jvm/transactions/**'
      - 'packages/jvm/crypto/**'
      - '.github/workflows/transactions.yml'
  pull_request:
    paths:
      - 'packages/jvm/transactions/**'
      - 'packages/jvm/crypto/**'
      - '.github/workflows/transactions.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/jvm/transactions

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        java: ['25']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, crypto)
        run: |
          set -euo pipefail
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-schemas && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519 && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst        && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto      && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)

      - name: Enforce version gates + compile + test
        run: ./mvnw --batch-mode --no-transfer-progress verify -Dmaven.javadoc.skip=true -Dgpg.skip=true

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: surefire-reports-java${{ matrix.java }}
          path: packages/jvm/transactions/target/surefire-reports/
          retention-days: 7

  audit:
    name: Security Audit (SpotBugs + PMD + OWASP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, crypto)
        run: |
          set -euo pipefail
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-schemas && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519 && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst        && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto      && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)

      - name: Run audit profile
        working-directory: packages/jvm/transactions
        run: |
          set -euo pipefail
          ./mvnw --batch-mode --no-transfer-progress verify -P audit \
            -Ddependency-check.skip=true -Dmaven.javadoc.skip=true -Dgpg.skip=true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: transactions-spotbugs-report
          path: packages/jvm/transactions/target/spotbugs*.xml
          retention-days: 14

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Install JVM prerequisites (protobuf-schemas, curve25519, blst, crypto)
        run: |
          set -euo pipefail
          (cd $GITHUB_WORKSPACE/packages/sdk/protobuf-schemas && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/curve25519 && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/blst        && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)
          (cd $GITHUB_WORKSPACE/packages/jvm/crypto      && ./mvnw --batch-mode --no-transfer-progress install -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true)

      - name: Build package + generate CycloneDX SBOM
        working-directory: packages/jvm/transactions
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests -Dmaven.javadoc.skip=true -Dgpg.skip=true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: transactions-sbom
          path: packages/jvm/transactions/target/bom.json
          retention-days: 90

