name: transactions-java

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/jvm/transactions-java/**'
      - '.github/workflows/transactions-java.yml'
  pull_request:
    paths:
      - 'packages/jvm/transactions-java/**'
      - '.github/workflows/transactions-java.yml'

defaults:
  run:
    working-directory: packages/jvm/transactions-java

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['25']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Enforce version gates + compile + test
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: surefire-reports-java${{ matrix.java }}
          path: packages/jvm/transactions-java/target/surefire-reports/
          retention-days: 7
