name: Groth16 CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/jvm/groth16/**'
      - '.github/workflows/groth16.yml'
  pull_request:
    paths:
      - 'packages/jvm/groth16/**'
      - '.github/workflows/groth16.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NATIVE_DIR: packages/jvm/groth16/groth16_jni/javalib/src/main/resources/META-INF/native

jobs:
  # ── Step 1: Build native JNI library for each platform ──────────────────────
  build-native:
    name: Native lib · ${{ matrix.platform }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      RUST_BACKTRACE: 1

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: amd64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            artifact: libgroth16_jni.so
            resource-path: linux64/amd64

          - platform: linux
            arch: aarch64
            # Native ARM64 runner (free for public repos since Jan 2025) —
            # matches publish-groth16.yml; avoids cross-compiling via
            # gcc-aarch64-linux-gnu with a different toolchain than what ships.
            os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
            artifact: libgroth16_jni.so
            resource-path: linux64/aarch64

          - platform: linux
            arch: x86
            os: ubuntu-latest
            rust-target: i686-unknown-linux-gnu
            artifact: libgroth16_jni.so
            resource-path: linux32/x86
            extra-packages: gcc-multilib

          - platform: osx
            arch: aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact: libgroth16_jni.dylib
            resource-path: osx64/aarch64

          - platform: osx
            arch: x86_64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            artifact: libgroth16_jni.dylib
            resource-path: osx64/x86_64

          - platform: windows
            arch: amd64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact: groth16_jni.dll
            resource-path: windows64/amd64

          - platform: windows
            arch: x86
            os: windows-latest
            rust-target: i686-pc-windows-msvc
            artifact: groth16_jni.dll
            resource-path: windows32/x86

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install cross-compilation packages (Linux cross targets)
        if: matrix.extra-packages
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.extra-packages }}

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: packages/jvm/groth16

      - name: Run Rust unit tests (native arch only)
        if: matrix.arch == 'amd64' || matrix.arch == 'x86_64'
        working-directory: packages/jvm/groth16
        run: cargo test --workspace --lib --target ${{ matrix.rust-target }}

      - name: Build native library
        working-directory: packages/jvm/groth16/groth16_jni
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Stage artifact for upload
        shell: bash
        run: |
          set -euo pipefail
          DEST="${{ env.NATIVE_DIR }}/${{ matrix.resource-path }}"
          mkdir -p "$DEST"
          rm -f "$DEST/.gitkeep"
          cp "packages/jvm/groth16/target/${{ matrix.rust-target }}/release/${{ matrix.artifact }}" "$DEST/"

      - name: Upload native library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-lib-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.NATIVE_DIR }}/**
          retention-days: 1

  # ── Step 1b: Rust security audit (ubuntu-amd64 only) ────────────────────────
  # cargo audit checks all advisories against the RustSec advisory DB.
  # Advisories that cannot be patched (embedded sapling-crypto legacy chain)
  # are formally documented with risk assessment in deny.toml and suppressed
  # here via --ignore flags.  See deny.toml for the full rationale.
  cargo-audit:
    name: Rust Security Audit (cargo audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: packages/jvm/groth16

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet

      - name: Run cargo audit
        working-directory: packages/jvm/groth16
        run: |
          # Ignored advisories are documented with risk assessment in deny.toml.
          # RUSTSEC-2023-0071: rsa Marvin timing — rsa not in production dep tree
          # RUSTSEC-2025-0055: new advisory on transitive dep with no fix available yet
          # RUSTSEC-2025-0141: bincode unmaintained — transitive via fastcrypto-zkp
          # RUSTSEC-2024-0388: derivative unmaintained — proc-macro, no runtime exposure
          # RUSTSEC-2024-0436: paste unmaintained — proc-macro, no runtime exposure
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0055 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2024-0436

  # ── Step 2: Java compile + test ─────────────────────────────────────────────
  build:
    name: Java 25 · Compile · Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-native
    defaults:
      run:
        working-directory: packages/jvm/groth16

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-lib-*
          merge-multiple: true
          path: ${{ env.NATIVE_DIR }}

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Enforce version gates + compile + test
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: groth16-surefire-reports
          path: packages/jvm/groth16/target/surefire-reports/
          retention-days: 7

  # ── Step 3: Security audit (main/dev only) ───────────────────────────────────
  audit:
    name: Security Audit (SpotBugs + PMD + OWASP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-lib-*
          merge-multiple: true
          path: ${{ env.NATIVE_DIR }}

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run audit profile
        working-directory: packages/jvm/groth16
        run: |
          set -euo pipefail
          ./mvnw --batch-mode --no-transfer-progress verify -P audit \
            -Ddependency-check.skip=true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: groth16-spotbugs-report
          path: packages/jvm/groth16/target/spotbugs*.xml
          retention-days: 14

  # ── Step 4: SBOM (main/dev only) ─────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-lib-*
          merge-multiple: true
          path: ${{ env.NATIVE_DIR }}

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Build package + generate CycloneDX SBOM
        working-directory: packages/jvm/groth16
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: groth16-sbom
          path: packages/jvm/groth16/target/bom.json
          retention-days: 90
