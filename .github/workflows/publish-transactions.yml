name: Publish Transactions

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

# Least-privilege token permissions (OWASP CI/CD A09).
# This workflow reads source code and publishes to Maven Central.
# It does not need write access to repository contents, PRs, issues,
# packages, or any other GitHub resource.
permissions:
  contents: read

concurrency:
  group: publish-transactions
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/_publish-maven.yml
    secrets: inherit
    with:
      package-path: packages/jvm/transactions
      artifact-name: transactions
      version: ${{ inputs.version }}
