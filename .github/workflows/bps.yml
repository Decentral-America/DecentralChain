name: BPS CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/blockchain-postgres-sync/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/blockchain-postgres-sync/**'
  workflow_dispatch:

concurrency:
  group: bps-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build, test & lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libpq-dev

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/blockchain-postgres-sync
          cache-on-failure: true

      - name: Check formatting
        working-directory: apps/blockchain-postgres-sync
        run: cargo fmt --all -- --check

      - name: Build
        working-directory: apps/blockchain-postgres-sync
        run: cargo build --all-targets

      - name: Clippy (deny warnings)
        working-directory: apps/blockchain-postgres-sync
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: apps/blockchain-postgres-sync
        run: cargo test --all-targets

      - name: Check documentation
        working-directory: apps/blockchain-postgres-sync
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

      # ── Security & dependency policy ──────────────────────────────────────────
      # cargo-deny 0.19.6: fixes env-var interference with advisory DB path
      # resolution in CI (PR#854). cargo-machete: detects unused dependencies.
      # taiki-e/install-action downloads pre-built binaries — no compilation.
      - name: Install cargo-deny and cargo-machete
        uses: taiki-e/install-action@e0eafa9a0d485c37f97c0f7beb930a58a2facbac # v2.79.4
        with:
          tool: cargo-deny@0.19.6,cargo-machete

      - name: Dependency policy check (cargo deny)
        working-directory: apps/blockchain-postgres-sync
        run: cargo deny check

      - name: Unused dependency check (cargo machete)
        working-directory: apps/blockchain-postgres-sync
        run: cargo machete
