name: BPS CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/blockchain-postgres-sync/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/blockchain-postgres-sync/**'
  # Manual dispatch: deploy to stagenet or testnet on demand.
  # Auto-deploy to mainnet happens on push to main (call-deploy job).
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy (stagenet or testnet)'
        required: true
        default: 'stagenet'
        type: choice
        options:
          - stagenet
          - testnet

concurrency:
  group: bps-${{ github.ref }}
  # Cancel in-flight CI runs on PRs (harmless), but never cancel deploy runs on
  # main — interrupting an SSH-based container restart leaves broken state.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build, test & lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libpq-dev

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/blockchain-postgres-sync
          cache-on-failure: true

      - name: Check formatting
        working-directory: apps/blockchain-postgres-sync
        run: cargo fmt --all -- --check

      - name: Build
        working-directory: apps/blockchain-postgres-sync
        run: cargo build --all-targets

      - name: Clippy (deny warnings)
        working-directory: apps/blockchain-postgres-sync
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: apps/blockchain-postgres-sync
        run: cargo test --all-targets

      - name: Check documentation
        working-directory: apps/blockchain-postgres-sync
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

      # ── Security & dependency policy ──────────────────────────────────────────
      # cargo-deny 0.19.6: fixes env-var interference with advisory DB path
      # resolution in CI (PR#854). cargo-machete: detects unused dependencies.
      # taiki-e/install-action downloads pre-built binaries — no compilation.
      - name: Install cargo-deny and cargo-machete
        uses: taiki-e/install-action@e0eafa9a0d485c37f97c0f7beb930a58a2facbac # v2.79.4
        with:
          tool: cargo-deny@0.19.6,cargo-machete

      - name: Dependency policy check (cargo deny)
        working-directory: apps/blockchain-postgres-sync
        run: cargo deny check

      - name: Unused dependency check (cargo machete)
        working-directory: apps/blockchain-postgres-sync
        run: cargo machete

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/decentral-america/blockchain-postgres-sync
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=DCC blockchain-postgres-sync
            org.opencontainers.image.description=Blockchain-to-PostgreSQL sync daemon for DecentralChain
            org.opencontainers.image.vendor=Decentral-America

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/blockchain-postgres-sync
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ── Resolve deploy network ────────────────────────────────────────────────────
  resolve:
    name: Resolve network
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    outputs:
      network: ${{ steps.network.outputs.network }}
    steps:
      - name: Determine target network
        id: network
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "network=${{ inputs.network }}" >> "$GITHUB_OUTPUT"
          else
            echo "network=mainnet" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy via infra reusable workflow ────────────────────────────────────────
  # Calls Decentral-America/infra/.github/workflows/deploy-container.yml.
  # That workflow reads DEPLOY_* secrets from the infra repo's environments
  # (mainnet/stagenet/testnet) — this repo needs zero environment secrets.
  # Runtime config (BLOCKCHAIN_UPDATES_URL, CHAIN_ID, PGHOST, PGDATABASE,
  # PGUSER, PGPASSWORD) lives in /opt/dcc/secrets/<network>.env on the server,
  # written at provision time by infra. Never stored in GitHub.
  #
  # Chain IDs: mainnet=63 ('?'), stagenet=83 ('S'), testnet=33 ('!')
  # ─────────────────────────────────────────────────────────────────────────────
  call-deploy:
    name: Deploy (${{ needs.resolve.outputs.network }})
    needs: [resolve, docker]
    uses: Decentral-America/infra/.github/workflows/deploy-container.yml@826b876d5f47f18bcee83fc6004ed1026340d239 # main
    with:
      network: ${{ needs.resolve.outputs.network }}
      image:   ghcr.io/decentral-america/blockchain-postgres-sync:${{ github.sha }}
      service: blockchain-postgres-sync
    secrets: inherit
