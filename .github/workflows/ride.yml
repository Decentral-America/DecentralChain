name: ride

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/ride/**'
      - '.github/workflows/ride.yml'
  pull_request:
    paths:
      - 'packages/ride/**'
      - '.github/workflows/ride.yml'

jobs:
  build:
    name: Build & Test (Scala 3 · JVM + Scala.js · Node 24)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      # JDK 25 (Temurin) — sbt and JVM subprojects
      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: sbt

      # sbt 1.12.11 launcher — version resolved from packages/ride/project/build.properties
      - name: Install sbt launcher
        uses: sbt/setup-sbt@2e222825582620cc38d2a54e674f3c01b7c14f5d  # v1.1.24

      # Node 24 — required by scalajs-env for Scala.js test execution
      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      # pnpm 11.2.2 — workspace package manager; needed for TypeScript wrapper
      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          version: '11.2.2'

      - name: Install workspace dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      # ── Scala/sbt build ──────────────────────────────────────────────────

      # Install curve25519 to local Maven cache (not yet published to Maven Central)
      - name: Install curve25519 to local Maven cache
        working-directory: packages/jvm/curve25519
        run: ./mvnw install -DskipTests --no-transfer-progress

      - name: Compile all subprojects (JVM + Scala.js cross-build)
        working-directory: packages/ride
        run: sbt --no-colors compile

      - name: Run JVM test suite
        working-directory: packages/ride
        run: sbt --no-colors test

      # Produces packages/ride/lang/js/dist/lang.js + packages/ride/repl/js/dist/repl.js
      - name: Build Scala.js full-link bundles
        working-directory: packages/ride
        run: sbt --no-colors "lang-js/fullLinkJS; repl-js/fullLinkJS"

      # ── TypeScript wrapper (@decentralchain/ride-js) ─────────────────────

      - name: Build TypeScript wrapper
        run: pnpm -F @decentralchain/ride-js build

      - name: Upload Scala.js bundles (lang + repl)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ride-js-bundles
          path: |
            packages/ride/lang/js/dist/
            packages/ride/repl/js/dist/
          retention-days: 7

  quality:
    name: Quality Gate (sbt bulletproof)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: sbt

      - name: Install sbt launcher
        uses: sbt/setup-sbt@2e222825582620cc38d2a54e674f3c01b7c14f5d  # v1.1.24

      - name: Install curve25519 to local Maven cache
        working-directory: packages/jvm/curve25519
        run: ./mvnw install -DskipTests --no-transfer-progress

      - name: Run bulletproof quality gate
        working-directory: packages/ride
        run: sbt --no-colors bulletproof
        # bulletproof = scalafmtCheckAll → scalafixAll --check →
        #   undeclaredCompileDependencies → unusedCompileDependencies →
        #   coverage → test → coverageReport

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ride-coverage-report
          path: packages/ride/target/scala-*/scoverage-report/
          retention-days: 14

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: sbt

      - name: Install sbt launcher
        uses: sbt/setup-sbt@2e222825582620cc38d2a54e674f3c01b7c14f5d  # v1.1.24

      - name: Generate dependency list (lang-jvm + lang-testkit)
        working-directory: packages/ride
        run: |
          sbt --no-colors "lang-jvm/dependencyList; lang-testkit/dependencyList" \
            > lang-deps.txt 2>&1 || true
          cat lang-deps.txt

      - name: Upload dependency manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ride-dependency-manifest
          path: packages/ride/lang-deps.txt
          retention-days: 90
