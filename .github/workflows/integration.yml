name: Integration CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/sdk/transactions/**'
      - 'packages/sdk/node-api/**'
      - 'docker-compose.test.yml'
      - '.github/workflows/integration.yml'
  pull_request:
    paths:
      - 'packages/sdk/transactions/**'
      - 'packages/sdk/node-api/**'
      - 'docker-compose.test.yml'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: integration-${{ github.ref }}

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Toggle from GitHub Settings > Variables > NX_NO_CLOUD (set to empty to re-enable).
  NX_NO_CLOUD: ${{ vars.NX_NO_CLOUD || 'true' }}

jobs:
  integration:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      # PostgreSQL for data-service (optional — skip if only testing node interaction)
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dcc
          POSTGRES_USER: dcc
          POSTGRES_PASSWORD: dcc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dcc -d dcc"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start DCC private node
        run: |
          # Pull the standard node-scala image and run with private chain configs
          # mounted in — no separate "private" image needed.
          if ! docker pull ghcr.io/decentral-america/node-scala:latest 2>/dev/null; then
            echo "::error::Cannot pull node-scala base image from GHCR. Make package public at https://github.com/orgs/Decentral-America/packages"
            exit 1
          fi
          docker run -d \
            --name dcc-test-node \
            --network host \
            -v "${{ github.workspace }}/docker/private-node/decentralchain.custom.conf:/etc/dcc/dcc.conf:ro" \
            -v "${{ github.workspace }}/docker/private-node/local.conf:/etc/dcc/local.conf:ro" \
            -e DCC_WALLET_SEED="TBXHUUcVx2n3Rgszpu5MCybRaR86JGmqCWp7XKh7czU57ox5dgjdX4K4" \
            -e DCC_WALLET_PASSWORD="test" \
            -e DCC_REST_API_BIND="0.0.0.0" \
            ghcr.io/decentral-america/node-scala:latest

      - name: Wait for node to be ready
        run: |
          echo "Waiting for DCC node REST API..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:6869/node/version > /dev/null 2>&1; then
              echo "Node is ready (attempt $i)"
              curl -s http://localhost:6869/node/version | jq .
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: Node failed to start in 60 seconds"
              docker logs dcc-test-node
              exit 1
            fi
            sleep 2
          done

      - name: Wait for block generation
        run: |
          echo "Waiting for at least 2 blocks..."
          for i in $(seq 1 30); do
            HEIGHT=$(curl -sf http://localhost:6869/blocks/height | jq .height)
            if [ "$HEIGHT" -ge 2 ] 2>/dev/null; then
              echo "Chain at height $HEIGHT — ready for tests"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: Chain stuck at height $HEIGHT after 60s"
              exit 1
            fi
            sleep 2
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version

      # ── Rust / WASM toolchain (required by packages/sdk/crypto wasm-pack build) ──
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/sdk/crypto
          cache-on-failure: true

      - name: Install wasm-pack v0.15.0
        run: |
          curl -fsSL \
            https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/wasm-pack.tar.gz
          echo "c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz" | sha256sum --check
          tar -xzf /tmp/wasm-pack.tar.gz -C /tmp
          mv /tmp/wasm-pack-v0.15.0-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/wasm-pack
          wasm-pack --version
      # ────────────────────────────────────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK dependencies
        run: pnpm nx run-many -t build --projects=types,ts-lib-crypto,bignumber,marshall,protobuf-serialization,node-api,@decentralchain/transactions

      - name: Run integration tests
        env:
          DCC_TEST_NODE_URL: http://localhost:6869
          DCC_TEST_CHAIN_ID: R
          DCC_TEST_MINER_SEED: "waves private node seed with waves tokens"
          DCC_TEST_MATCHER_URL: http://localhost:6886
        run: pnpm --filter @decentralchain/transactions test:integration

      - name: Node logs on failure
        if: failure()
        run: docker logs dcc-test-node 2>&1 | tail -100

      - name: Cleanup
        if: always()
        run: docker rm -f dcc-test-node 2>/dev/null || true
