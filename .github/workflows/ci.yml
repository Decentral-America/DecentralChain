name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  cancel-in-progress: true
  group: ci-${{ github.ref }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version

      # ── Rust / WASM toolchain (required by packages/sdk/crypto wasm-pack build) ──────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/sdk/crypto
          cache-on-failure: true

      - name: Install wasm-pack v0.15.0
        run: |
          curl -fsSL \
            https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/wasm-pack.tar.gz
          echo "c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz" | sha256sum --check
          tar -xzf /tmp/wasm-pack.tar.gz -C /tmp
          mv /tmp/wasm-pack-v0.15.0-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/wasm-pack
          wasm-pack --version
      # ─────────────────────────────────────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive NX SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Security audit
        run: pnpm audit --audit-level=moderate

      - name: Scan for secrets (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: secret
          # Disable cache to avoid trivy-action's internal setup-trivy calling
          # actions/cache@0400d5f (Node20) which conflicts with FORCE_JAVASCRIPT_ACTIONS_TO_NODE24.
          # Secret scanning is fast and does not benefit from DB caching.
          cache: 'false'

      - name: Check module boundaries
        run: node scripts/check-boundaries.mjs

      - name: Biome lint (affected)
        run: pnpm nx affected -t biome-lint

      - name: Build (affected)
        # blockchain-postgres-sync: needs protoc (not installed here; tested by bps.yml)
        # JVM packages (blst,crypto,curve25519,groth16,java-sdk,transactions): need
        # Java setup; each has a dedicated workflow (blst.yml, curve25519.yml, etc.)
        run: pnpm nx affected -t build --exclude=blockchain-postgres-sync,blst,crypto,curve25519,groth16,java-sdk,transactions

      - name: Typecheck (affected)
        # Build runs first so node-api-js dist/ files are on disk before typecheck.
        # Same JVM exclusions: no typecheck targets defined for those packages.
        run: pnpm nx affected -t typecheck --exclude=blst,crypto,curve25519,groth16,java-sdk,transactions

      - name: Test (affected)
        run: pnpm nx affected -t test --exclude=blockchain-postgres-sync,blst,crypto,curve25519,groth16,java-sdk,transactions

      - name: Verify package exports (affected)
        run: pnpm nx affected -t check:exports --exclude=cubensis-connect,exchange,scanner

      - name: Verify package publishing (affected)
        run: pnpm nx affected -t check:publint --exclude=cubensis-connect,exchange,scanner,ts-types

      - name: Verify bundle size (affected)
        run: pnpm nx affected -t check:size --exclude=cubensis-connect,exchange,scanner

      - name: Format check
        run: pnpm exec biome format --reporter=github .

      - name: License scan
        run: pnpm licenses list --prod 2>&1 | tee /tmp/licenses.txt && echo "License scan complete ($(wc -l < /tmp/licenses.txt) entries)"

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: always
          fail-on-severity: high
