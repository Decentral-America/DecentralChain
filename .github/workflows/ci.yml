name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  cancel-in-progress: true
  group: ci-${{ github.ref }}

permissions:
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          node-version-file: .node-version

      # ── Rust / WASM toolchain (required by packages/crypto wasm-pack build) ──────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/crypto
          cache-on-failure: true

      - name: Install wasm-pack v0.14.0
        run: |
          curl -fsSL \
            https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/wasm-pack.tar.gz
          echo "278a8d668085821f4d1a637bd864f1713f872b0ae3a118c77562a308c0abfe8d  /tmp/wasm-pack.tar.gz" | sha256sum --check
          tar -xzf /tmp/wasm-pack.tar.gz -C /tmp
          mv /tmp/wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/wasm-pack
          wasm-pack --version
      # ─────────────────────────────────────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive NX SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Scan for secrets (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          scanners: secret

      - name: Check module boundaries
        run: node scripts/check-boundaries.mjs

      - name: Biome lint (affected)
        run: npx nx affected -t biome-lint

      - name: Typecheck (affected)
        run: npx nx affected -t typecheck

      - name: Build (affected)
        run: npx nx affected -t build

      - name: Test (affected)
        run: npx nx affected -t test

      - name: Verify package exports (affected)
        run: npx nx affected -t check:exports --exclude=cubensis-connect,exchange,scanner

      - name: Verify package publishing (affected)
        run: npx nx affected -t check:publint --exclude=cubensis-connect,exchange,scanner,ts-types

      - name: Verify bundle size (affected)
        run: npx nx affected -t check:size --exclude=cubensis-connect,exchange,scanner

      - name: Format check
        run: npx biome format --reporter=github .

      - name: License scan
        run: pnpm licenses list --prod 2>&1 | tee /tmp/licenses.txt && echo "License scan complete ($(wc -l < /tmp/licenses.txt) entries)"

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: always
          fail-on-severity: high
