name: Publish Protobuf Serialization

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.6.2)'
        required: true
        default: '1.6.2'

permissions:
  contents: read

concurrency:
  group: publish-protobuf-serialization
  cancel-in-progress: false

defaults:
  run:
    working-directory: packages/sdk/protobuf-serialization

jobs:
  publish:
    name: Sign · Upload · Await approval
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Java 25 (Temurin) + Maven Central credentials
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Set release version
        run: |
          ./mvnw --batch-mode versions:set \
            -DnewVersion=${{ inputs.version }} \
            -DgenerateBackupPoms=false

      - name: Build + verify
        run: ./mvnw --batch-mode --no-transfer-progress verify -Dgpg.skip=true

      - name: GPG-sign and deploy to Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          ./mvnw --batch-mode deploy -P release -DskipTests \
            -Dgpg.keyname="${{ secrets.MAVEN_GPG_KEY_ID }}"

      - name: Upload staging artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: protobuf-schemas-${{ inputs.version }}-staged
          path: packages/sdk/protobuf-serialization/target/*.jar
          retention-days: 30
