name: publish-ride

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.6.2)'
        required: true
        default: '1.6.2'
      npm_tag:
        description: 'npm dist-tag (latest | next | beta)'
        required: false
        default: 'latest'

jobs:
  publish:
    name: Sign · Publish · Release (JVM + npm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      # ── JVM: Java 25 + GPG + Maven Central credentials ──────────────────

      - name: Set up JDK 25 (Temurin) + GPG + Maven Central
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: sbt
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Install sbt launcher
        uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2  # v1.1.23

      # ── Node / pnpm: npm auth + TypeScript wrapper ───────────────────────

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9  # v6.0.8
        with:
          version: '11.1.1'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── Pre-flight quality gate ──────────────────────────────────────────

      - name: Run bulletproof quality gate before release
        working-directory: packages/ride
        run: sbt --no-colors bulletproof

      # ── JVM publish: GPG-sign + stage + release to Maven Central ────────

      - name: Sign and publish JVM artifacts to Central Portal staging
        working-directory: packages/ride
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          sbt --no-colors \
            -Dgpg.keyname="${{ secrets.MAVEN_GPG_KEY_ID }}" \
            publishSigned

      - name: Release staged bundle to Maven Central (sonaRelease)
        working-directory: packages/ride
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: sbt --no-colors sonaRelease

      # ── Scala.js: build JS bundles ───────────────────────────────────────
      # fullLinkJS outputs:
      #   packages/ride/lang/js/dist/lang.js   → @decentralchain/ride-lang
      #   packages/ride/repl/js/dist/repl.js   → @decentralchain/ride-repl

      - name: Build Scala.js full-link bundles
        working-directory: packages/ride
        run: sbt --no-colors "lang-js/fullLinkJS; repl-js/fullLinkJS"

      # ── npm publish: ride-lang ────────────────────────────────────────────

      - name: Publish @decentralchain/ride-lang to npm
        working-directory: packages/ride/lang/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public \
            --tag ${{ inputs.npm_tag }} \
            --no-git-checks

      # ── npm publish: ride-repl ────────────────────────────────────────────

      - name: Publish @decentralchain/ride-repl to npm
        working-directory: packages/ride/repl/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public \
            --tag ${{ inputs.npm_tag }} \
            --no-git-checks

      # ── npm publish: ride-js TypeScript wrapper ───────────────────────────
      # Build first (tsdown + type declarations) then publish.
      # pnpm replaces workspace:* refs with the just-published version.

      - name: Build TypeScript wrapper (@decentralchain/ride-js)
        run: pnpm -F @decentralchain/ride-js build

      - name: Publish @decentralchain/ride-js to npm
        working-directory: packages/ride/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public \
            --tag ${{ inputs.npm_tag }} \
            --no-git-checks

      # ── Upload staged JVM artifacts ───────────────────────────────────────

      - name: Upload staged JARs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ride-jvm-staged-${{ inputs.version }}
          path: |
            packages/ride/lang/jvm/target/*.jar
            packages/ride/lang/testkit/target/*.jar
          retention-days: 30
