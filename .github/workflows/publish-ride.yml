name: Publish RIDE

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.6.2)'
        required: true
        default: '1.6.2'
      npm_tag:
        description: 'npm dist-tag (latest | next | beta)'
        required: false
        default: 'latest'
      skip_maven:
        description: 'Skip JVM publish (Maven already at this version)'
        required: false
        type: boolean
        default: false

# Least-privilege token permissions (OWASP CI/CD A09).
# This workflow reads source code, publishes to Maven Central and npm.
# No GitHub write access needed beyond the implicit read for checkout.
permissions:
  contents: read
  id-token: write   # required for npm provenance attestation

concurrency:
  group: publish-ride
  cancel-in-progress: false

env:
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0 -XX:-UseZGC -XX:+UseG1GC -Xss4m -XX:MaxMetaspaceSize=1g"

jobs:
  publish:
    name: Sign · Publish · Release (JVM + npm)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Gates the whole job (JVM + npm) behind a human approval. Maven Central
    # side is additionally soft-gated by Central Portal's autoPublish:false;
    # npm has no other gate, hence this environment.
    environment: npm-release

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # ── JVM: Java 25 + GPG + Maven Central credentials ──────────────────

      - name: Set up JDK 25 (Temurin) + GPG + Maven Central
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          distribution: temurin
          java-version: '25'
          cache: sbt
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Install sbt launcher
        uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b  # v1.2.1

      # ── Node / pnpm: npm auth + TypeScript wrapper ───────────────────────

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── Pre-flight quality gate ──────────────────────────────────────────

      - name: Run bulletproof quality gate before release
        working-directory: packages/ride
        run: sbt --no-colors bulletproof

      # ── JVM publish: GPG-sign + stage + release to Maven Central ────────

      - name: Sign and publish JVM artifacts to Central Portal staging
        if: ${{ !inputs.skip_maven }}
        working-directory: packages/ride
        env:
          SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_GPG_KEY_ID: ${{ secrets.MAVEN_GPG_KEY_ID }}
          RIDE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Pre-cache the GPG passphrase in the agent so sbt's CommandLineGpgSigner
          # can sign without a TTY prompt.
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent
          echo "$MAVEN_GPG_PASSPHRASE" | gpg --batch \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --default-key "$MAVEN_GPG_KEY_ID" \
            --sign --armor -o /dev/null /dev/null 2>/dev/null || true
          # Use inline `set` instead of writing version.sbt — no file written means
          # the git working tree stays clean and sbt-git won't append -DIRTY to the
          # deployment name in the Sonatype portal.
          sbt --no-colors \
            -Dgpg.keyname="${MAVEN_GPG_KEY_ID}" \
            "set ThisBuild / version := \"${RIDE_VERSION}\"" \
            publishSigned

      - name: Release staged bundle to Maven Central (sonatypeBundleRelease)
        if: ${{ !inputs.skip_maven }}
        working-directory: packages/ride
        env:
          SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          RIDE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          sbt --no-colors \
            "set ThisBuild / version := \"${RIDE_VERSION}\"" \
            sonatypeBundleRelease

      # ── Scala.js: build JS bundles ───────────────────────────────────────
      # fullOptJS outputs (via artifactPath in lang/js/build.sbt and repl/js/build.sbt):
      #   packages/ride/lang/js/dist/lang.js   → @decentralchain/ride-lang
      #   packages/ride/repl/js/dist/repl.js   → @decentralchain/ride-repl

      - name: Build Scala.js full-link bundles
        working-directory: packages/ride
        env:
          RIDE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # lang-js and repl-js have hyphens which break sbt's projectId/task
          # scoping syntax in batch mode. Switch context with `project` first,
          # then run fullLinkJS in that project scope.
          # fullOptJS respects the artifactPath configured in lang/js/build.sbt
          # and repl/js/build.sbt (dist/lang.js and dist/repl.js respectively).
          # fullLinkJS uses a different output API and ignores those settings.
          sbt --no-colors \
            "set ThisBuild / version := \"${RIDE_VERSION}\"" \
            "project langJS" \
            fullOptJS
          sbt --no-colors \
            "set ThisBuild / version := \"${RIDE_VERSION}\"" \
            "project replJS" \
            fullOptJS

      # ── npm publish: ride-lang ────────────────────────────────────────────

      - name: Publish @decentralchain/ride-lang to npm
        working-directory: packages/ride/lang/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -euo pipefail
          npm publish --access public \
            --tag "${NPM_TAG}" \
            --no-git-checks

      # ── npm publish: ride-repl ────────────────────────────────────────────

      - name: Publish @decentralchain/ride-repl to npm
        working-directory: packages/ride/repl/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -euo pipefail
          npm publish --access public \
            --tag "${NPM_TAG}" \
            --no-git-checks

      # ── npm publish: ride TypeScript wrapper ───────────────────────────
      # Build first (tsdown + type declarations) then publish.
      # pnpm replaces workspace:* refs with the just-published version.

      - name: Build TypeScript wrapper (@decentralchain/ride)
        run: pnpm -F @decentralchain/ride build

      - name: Publish @decentralchain/ride to npm
        working-directory: packages/ride/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -euo pipefail
          npm publish --access public \
            --tag "${NPM_TAG}" \
            --no-git-checks

      # ── Upload staged JVM artifacts ───────────────────────────────────────

      - name: Upload staged JARs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ride-${{ inputs.version }}
          path: |
            packages/ride/lang/jvm/target/*.jar
            packages/ride/lang/testkit/target/*.jar
          retention-days: 30
