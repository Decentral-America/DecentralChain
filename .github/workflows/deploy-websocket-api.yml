name: Deploy WebSocket API

on:
  # Tag-based release trigger: deploy fires only when you explicitly push a
  # versioned tag. Usage: git tag websocket-api/v1.0.0 && git push origin websocket-api/v1.0.0
  push:
    tags:
      - 'websocket-api/v*.*.*'

  # Manual dispatch: deploy to stagenet or testnet on demand.
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy (stagenet or testnet)'
        required: true
        default: 'testnet'
        type: choice
        options:
          - stagenet
          - testnet

concurrency:
  group: deploy-websocket-api-${{ github.event_name == 'workflow_dispatch' && inputs.network || 'mainnet' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/decentral-america/websocket-api

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/decentral-america/websocket-api
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=DCC WebSocket API
            org.opencontainers.image.description=Real-time WebSocket pub/sub gateway for DecentralChain
            org.opencontainers.image.vendor=Decentral-America

      - name: Build and push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/websocket-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  resolve:
    name: Resolve network
    runs-on: ubuntu-latest
    needs: docker
    outputs:
      network: ${{ steps.network.outputs.network }}
    steps:
      - name: Determine target network
        id: network
        env:
          INPUT_NETWORK: ${{ inputs.network }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "network=${INPUT_NETWORK}" >> "$GITHUB_OUTPUT"
          else
            echo "network=mainnet" >> "$GITHUB_OUTPUT"
          fi

  call-deploy:
    name: Deploy (${{ needs.resolve.outputs.network }})
    needs: [resolve]
    uses: Decentral-America/infra/.github/workflows/deploy-container.yml@main
    with:
      network:      ${{ needs.resolve.outputs.network }}
      image:        ghcr.io/decentral-america/websocket-api:${{ github.sha }}
      service:      websocket-api
      wait_timeout: 60
    secrets: inherit
