name: Deploy WebSocket API

on:
  # Tag-based release trigger: deploy fires only when you explicitly push a
  # versioned tag. Usage: git tag websocket-api/v1.0.0 && git push origin websocket-api/v1.0.0
  push:
    tags:
      - 'websocket-api/v*.*.*'

  # Manual dispatch: deploy to stagenet or testnet on demand.
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy (stagenet or testnet)'
        required: true
        default: 'testnet'
        type: choice
        options:
          - stagenet
          - testnet

concurrency:
  group: deploy-websocket-api-${{ github.event_name == 'workflow_dispatch' && inputs.network || 'mainnet' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/decentral-america/websocket-api

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.88'

      - name: Install cargo-nextest
        uses: taiki-e/install-action@6887963ccf37a9ddcd8c5fa4baeb3e1e5fd61fa1 # v2.81.2
        with:
          tool: cargo-nextest

      - name: Run tests
        working-directory: apps/websocket-api
        run: cargo nextest run --all-targets

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/decentral-america/websocket-api
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=DCC WebSocket API
            org.opencontainers.image.description=Real-time WebSocket pub/sub gateway for DecentralChain
            org.opencontainers.image.vendor=Decentral-America

      - name: Build and push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/websocket-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  resolve:
    name: Resolve network
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: docker
    outputs:
      network: ${{ steps.network.outputs.network }}
    steps:
      - name: Determine target network
        id: network
        env:
          INPUT_NETWORK: ${{ inputs.network }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "network=${INPUT_NETWORK}" >> "$GITHUB_OUTPUT"
          else
            echo "network=mainnet" >> "$GITHUB_OUTPUT"
          fi

  # Cross-repo reusable workflow calls fail non-deterministically on GitHub Free
  # for this org. Inline the deploy logic directly — identical behaviour to
  # deploy-container.yml: Trivy scan → SCP compose file → SSH deploy with rollback.
  scan:
    name: Trivy scan websocket-api
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout infra repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Decentral-America/infra
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref:      'ghcr.io/decentral-america/websocket-api:${{ github.sha }}'
          format:         'sarif'
          output:         'trivy-results.sarif'
          severity:       'HIGH,CRITICAL'
          exit-code:      '1'
          ignore-unfixed: true
          scanners:       'vuln'
          version:        'v0.71.0'
          limit-severities-for-sarif: 'true'
          trivyignores:   '.trivyignore'

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy (${{ needs.resolve.outputs.network }})
    runs-on: ubuntu-latest
    needs: [resolve, scan]
    timeout-minutes: 15

    steps:
      - name: Checkout infra repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Decentral-America/infra
          persist-credentials: false

      - name: Set up SSH credentials
        env:
          DEPLOY_HOST: ${{ needs.resolve.outputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || needs.resolve.outputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_KEY:  ${{ needs.resolve.outputs.network == 'testnet' && secrets.TESTNET_DEPLOY_SSH_KEY || needs.resolve.outputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_SSH_KEY || secrets.MAINNET_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload websocket-api.yml to server
        env:
          DEPLOY_HOST: ${{ needs.resolve.outputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || needs.resolve.outputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_USER: ${{ needs.resolve.outputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || needs.resolve.outputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key \
            compose/websocket-api.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/dcc/compose/"

      - name: Pull image, deploy, and auto-rollback on failure
        env:
          GHCR_TOKEN:    ${{ secrets.GHCR_TOKEN }}
          DEPLOY_HOST:   ${{ needs.resolve.outputs.network == 'testnet' && secrets.TESTNET_DEPLOY_HOST || needs.resolve.outputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_HOST || secrets.MAINNET_DEPLOY_HOST }}
          DEPLOY_USER:   ${{ needs.resolve.outputs.network == 'testnet' && secrets.TESTNET_DEPLOY_USER || needs.resolve.outputs.network == 'stagenet' && secrets.STAGENET_DEPLOY_USER || secrets.MAINNET_DEPLOY_USER }}
          INPUT_IMAGE:   ghcr.io/decentral-america/websocket-api:${{ github.sha }}
          INPUT_NETWORK: ${{ needs.resolve.outputs.network }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=10 \
            "$DEPLOY_USER@$DEPLOY_HOST" bash -s << REMOTE
          set -euo pipefail
          GHCR_TOKEN="${GHCR_TOKEN}"
          INPUT_IMAGE="${INPUT_IMAGE}"
          INPUT_NETWORK="${INPUT_NETWORK}"

          export IMAGE_TAG="\$INPUT_IMAGE"
          export NETWORK="\$INPUT_NETWORK"
          SERVICE="websocket-api"
          COMPOSE_DIR="/opt/dcc/compose"

          echo "Authenticating with GHCR..."
          echo "\$GHCR_TOKEN" | docker login ghcr.io -u x-access-token --password-stdin

          PREV_IMAGE=\$(docker inspect --format '{{.Config.Image}}' "\${SERVICE}-\${NETWORK}" 2>/dev/null || echo "")
          echo "Previous image: \${PREV_IMAGE:-<none — first deploy>}"

          EXISTING_PROJECT=\$(docker inspect \
            --format '{{index .Config.Labels "com.docker.compose.project"}}' \
            "\${SERVICE}-\${NETWORK}" 2>/dev/null || true)
          EXPECTED_PROJECT="\${SERVICE}-\${NETWORK}"
          if [[ -n "\$EXISTING_PROJECT" && "\$EXISTING_PROJECT" != "\$EXPECTED_PROJECT" ]]; then
            docker rm -f "\${SERVICE}-\${NETWORK}"
          fi

          echo "Pulling \$IMAGE_TAG"
          docker pull "\$IMAGE_TAG"

          echo "Deploying \$SERVICE on \$NETWORK..."
          cd "\$COMPOSE_DIR"

          if ! docker compose \
            --project-name "\${SERVICE}-\${NETWORK}" \
            --file "\${SERVICE}.yml" up \
            --detach \
            --wait \
            --wait-timeout 120 \
            "\$SERVICE"; then

            echo "::error::Health check failed for \$SERVICE on \$NETWORK."
            echo "=== docker logs \${SERVICE}-\${NETWORK} ==="
            docker logs "\${SERVICE}-\${NETWORK}" 2>&1 | tail -40 || true
            echo "=== docker inspect state ==="
            docker inspect "\${SERVICE}-\${NETWORK}" 2>&1 | python3 -c "import sys,json; d=json.load(sys.stdin); s=d[0]['State']; print('Status:', s['Status']); print('ExitCode:', s['ExitCode']); print('Error:', s['Error']); print('OOMKilled:', s['OOMKilled'])" 2>/dev/null || true

            if [[ -n "\$PREV_IMAGE" ]]; then
              echo "Rolling back to \$PREV_IMAGE"
              export IMAGE_TAG="\$PREV_IMAGE"
              docker compose \
                --project-name "\${SERVICE}-\${NETWORK}" \
                --file "\${SERVICE}.yml" up \
                --detach --wait --wait-timeout 120 "\$SERVICE" \
                && echo "Rollback successful." \
                || echo "::error::Rollback also failed — manual intervention required."
            fi
            exit 1
          fi

          docker image prune -f
          echo "Deploy complete: \$IMAGE_TAG → \$NETWORK"
          REMOTE
