name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '30 5 * * 1'  # Weekly on Monday at 05:30 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # TypeScript/JavaScript source — the primary language of this monorepo
          - language: javascript-typescript
            build-mode: none
          # GitHub Actions workflow files
          - language: actions
            build-mode: none
        # Intentionally excluded (detected by GitHub but not our source code):
        #   c-cpp        — vendored in Node.js native deps only
        #   java-kotlin  — no Java/Kotlin source in this repo
        #   python        — no Python source in this repo
        #   rust          — vendored in Rust native addons only

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4.36.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended adds more security queries on top of the default suite
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4.36.1
        with:
          category: "/language:${{ matrix.language }}"
