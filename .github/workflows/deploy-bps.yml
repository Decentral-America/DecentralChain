name: Deploy BPS

on:
  # Tag-based release trigger: deploy fires only when you explicitly push a
  # versioned tag — never on branch merges. Ship when you're ready.
  # Usage: git tag bps/v1.2.3 && git push origin bps/v1.2.3
  push:
    tags:
      - 'bps/v*.*.*'

  # Manual dispatch: deploy to stagenet or testnet on demand.
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy (stagenet or testnet)'
        required: true
        default: 'stagenet'
        type: choice
        options:
          - stagenet
          - testnet

concurrency:
  # One deploy per network at a time.
  group: deploy-bps-${{ github.event_name == 'workflow_dispatch' && inputs.network || 'mainnet' }}
  # Never cancel an in-flight deploy — killing an SSH session mid-restart leaves
  # the service in a broken state. Queue the new run instead.
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write  # required for infra deploy-container.yml Trivy SARIF upload
  # attestations/id-token/artifact-metadata are scoped to docker job only —
  # setting them at workflow level blocks uses: reusable-workflow-call job scheduling.

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/decentral-america/blockchain-postgres-sync

jobs:
  # ── Build and push Docker image ───────────────────────────────────────────────
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96'

      - name: Install cargo-nextest
        uses: taiki-e/install-action@6887963ccf37a9ddcd8c5fa4baeb3e1e5fd61fa1 # v2.81.2
        with:
          tool: cargo-nextest

      - name: Install protoc (required by tonic-prost-build)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends protobuf-compiler libpq-dev

      - name: Run tests
        working-directory: apps/blockchain-postgres-sync
        run: cargo nextest run --all-targets

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        # Authenticate to avoid anonymous pull rate-limits (100 pulls/6h) when
        # docker/build-push-action pulls rust:1.95 and debian:12-slim base images.
        # Requires: org variable DOCKERHUB_USERNAME + org secret DOCKERHUB_TOKEN.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/decentral-america/blockchain-postgres-sync
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=DCC blockchain-postgres-sync
            org.opencontainers.image.description=Blockchain-to-PostgreSQL sync daemon for DecentralChain
            org.opencontainers.image.vendor=Decentral-America

      - name: Build and push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/blockchain-postgres-sync
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ── Resolve deploy network ────────────────────────────────────────────────────
  resolve:
    name: Resolve network
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: docker
    outputs:
      network: ${{ steps.network.outputs.network }}
    steps:
      - name: Determine target network
        id: network
        env:
          INPUT_NETWORK: ${{ inputs.network }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "network=${INPUT_NETWORK}" >> "$GITHUB_OUTPUT"
          else
            echo "network=mainnet" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy via infra reusable workflow ────────────────────────────────────────
  # Calls Decentral-America/infra/.github/workflows/deploy-container.yml.
  # That workflow reads DEPLOY_* secrets from the infra repo's environments
  # (mainnet/stagenet/testnet) — this repo needs zero environment secrets.
  # Runtime config (BLOCKCHAIN_UPDATES_URL, CHAIN_ID, PGHOST, PGDATABASE,
  # PGUSER, PGPASSWORD) lives in /opt/dcc/secrets/<network>.env on the server,
  # written at provision time by infra. Never stored in GitHub.
  #
  # Chain IDs: mainnet=63 ('?'), stagenet=83 ('S'), testnet=33 ('!')
  # ─────────────────────────────────────────────────────────────────────────────
  call-deploy:
    name: Deploy (${{ needs.resolve.outputs.network }})
    needs: [resolve]
    uses: Decentral-America/infra/.github/workflows/deploy-container.yml@f58a120fc0c58a3f2791d1db28355e00b64eb876 # main
    with:
      network: ${{ needs.resolve.outputs.network }}
      image:   ghcr.io/decentral-america/blockchain-postgres-sync:${{ github.sha }}
      service: blockchain-postgres-sync
    secrets: inherit
