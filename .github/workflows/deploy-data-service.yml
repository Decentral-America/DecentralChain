name: Deploy Data Service

on:
  # Tag-based release trigger: deploy fires only when you explicitly push a
  # versioned tag — never on branch merges. Ship when you're ready.
  # Usage: git tag data-service/v1.2.3 && git push origin data-service/v1.2.3
  push:
    tags:
      - 'data-service/v*.*.*'

  # Manual trigger: deploy to any network on demand.
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - mainnet
          - stagenet
          - testnet

concurrency:
  group: ci-deploy-data-service-${{ github.event_name == 'workflow_dispatch' && inputs.network || 'mainnet' }}
  # Never cancel an in-flight deploy — killing an SSH session mid-restart leaves
  # the service in a broken state. Queue the new run instead.
  cancel-in-progress: false

permissions:
  contents: read
  packages: write        # Required to push to ghcr.io
  security-events: write # Required for infra deploy-container.yml Trivy SARIF upload
  # attestations/id-token/artifact-metadata are scoped to docker job only —
  # setting them at workflow level blocks uses: reusable-workflow-call job scheduling.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/decentral-america/data-service

jobs:
  # ── Build and push Docker image ───────────────────────────────────────────────
  # One image serves all networks — Postgres credentials and matcher config
  # are injected at container start via environment-scoped GitHub Secrets.
  # Note: docker job has no needs so it runs first (same pattern as BPS/scanner).
  # Resolve runs after docker to avoid a diamond dependency that prevents the
  # call-deploy reusable-workflow-call job from being scheduled by GitHub Actions.
  docker:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        # Authenticate to avoid anonymous pull rate-limits (100 pulls/6h) when
        # docker/build-push-action pulls node:24-alpine base image.
        # Requires: org variable DOCKERHUB_USERNAME + org secret DOCKERHUB_TOKEN.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=DCC Data Service
            org.opencontainers.image.description=DecentralChain REST data API (Hono + PostgreSQL)
            org.opencontainers.image.vendor=Decentral-America

      - name: Build and push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/data-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Write image summary
        run: |
          set -euo pipefail
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Resolve deploy network ────────────────────────────────────────────────────
  # Runs after docker (linear chain matches BPS pattern) to avoid the diamond
  # dependency that prevents reusable-workflow-call jobs from being scheduled.
  resolve:
    name: Resolve network
    runs-on: ubuntu-latest
    needs: docker
    outputs:
      network: ${{ steps.network.outputs.network }}
    steps:
      - name: Determine target network
        id: network
        env:
          INPUT_NETWORK: ${{ inputs.network }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "network=${INPUT_NETWORK}" >> "$GITHUB_OUTPUT"
          else
            echo "network=mainnet" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy via infra reusable workflow ───────────────────────────────────────
  call-deploy:
    name: Deploy (${{ needs.resolve.outputs.network }})
    needs: [resolve]
    uses: Decentral-America/infra/.github/workflows/deploy-container.yml@934f62e02b501487ccf4b189cd650e7a78bb18b7 # main
    with:
      network: ${{ needs.resolve.outputs.network }}
      image:   ghcr.io/decentral-america/data-service:${{ github.sha }}
      service: data-service
    secrets: inherit
