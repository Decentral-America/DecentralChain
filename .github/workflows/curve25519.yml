name: Curve25519 CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/jvm/curve25519/**'
      - '.github/workflows/curve25519.yml'
  pull_request:
    paths:
      - 'packages/jvm/curve25519/**'
      - '.github/workflows/curve25519.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/jvm/curve25519

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        java: ['25']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Enforce version gates + compile + test
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: curve25519-surefire-reports-java${{ matrix.java }}
          path: packages/jvm/curve25519/target/surefire-reports/
          retention-days: 7

  audit:
    name: Security Audit (SpotBugs + PMD + OWASP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run audit profile
        working-directory: packages/jvm/curve25519
        run: |
          set -euo pipefail
          ./mvnw --batch-mode --no-transfer-progress verify -P audit \
            -Ddependency-check.skip=true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: curve25519-spotbugs-report
          path: packages/jvm/curve25519/target/spotbugs*.xml
          retention-days: 14

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Build package + generate CycloneDX SBOM
        working-directory: packages/jvm/curve25519
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: curve25519-sbom
          path: packages/jvm/curve25519/target/bom.json
          retention-days: 90
