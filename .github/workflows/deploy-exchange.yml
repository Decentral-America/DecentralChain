name: Deploy Exchange

on:
  # Auto-trigger on push to main: builds and deploys the mainnet SPA.
  push:
    branches: [main]
    paths:
      - 'apps/exchange/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'tsconfig.base.json'

  # Manual trigger: build and deploy any network on demand.
  # Use this for staging/testnet releases and production hotfixes.
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - mainnet
          - stagenet
          - testnet

concurrency:
  # One deploy per network at a time. New runs cancel in-flight builds for the
  # same network but do not cancel builds for other networks.
  group: deploy-exchange-${{ github.event_name == 'workflow_dispatch' && inputs.network || 'mainnet' }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write  # Required for Cloudflare Pages deployment status in PRs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve build parameters ─────────────────────────────────────────────────
  # Centralise the push/dispatch → (network, build_mode, cf_project) mapping so
  # downstream jobs can reference typed outputs rather than repeating logic.
  resolve:
    name: Resolve build parameters
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      network:    ${{ steps.params.outputs.network }}
      build_mode: ${{ steps.params.outputs.build_mode }}
      cf_project: ${{ steps.params.outputs.cf_project }}

    steps:
      - name: Compute network, build mode, and CF project name
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            NETWORK="${{ inputs.network }}"
          else
            NETWORK="mainnet"
          fi

          case "$NETWORK" in
            mainnet)
              BUILD_MODE="production"
              CF_PROJECT="dcc-exchange-mainnet"
              ;;
            stagenet)
              BUILD_MODE="staging"
              CF_PROJECT="dcc-exchange-stagenet"
              ;;
            testnet)
              BUILD_MODE="testnet"
              CF_PROJECT="dcc-exchange-testnet"
              ;;
            *)
              echo "::error::Unknown network: $NETWORK"
              exit 1
              ;;
          esac

          echo "network=$NETWORK"        >> "$GITHUB_OUTPUT"
          echo "build_mode=$BUILD_MODE"  >> "$GITHUB_OUTPUT"
          echo "cf_project=$CF_PROJECT"  >> "$GITHUB_OUTPUT"

          echo "### Build parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter  | Value |"  >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-------|"  >> "$GITHUB_STEP_SUMMARY"
          echo "| Network    | \`$NETWORK\` |"    >> "$GITHUB_STEP_SUMMARY"
          echo "| BuildMode  | \`$BUILD_MODE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CF Project | \`$CF_PROJECT\` |" >> "$GITHUB_STEP_SUMMARY"

  # ── Build static assets ───────────────────────────────────────────────────────
  # The exchange is a React SPA (Vite). We build it here in GHA and upload
  # the dist/ directory directly to Cloudflare Pages — no Docker involved.
  # Each network maps to a separate CF Pages project, so network selection is
  # baked in at build time via the Vite --mode flag, exactly as before.
  #
  # Prerequisite: 3 CF Pages projects must exist before first deploy:
  #   npx wrangler@4.90.0 pages project create dcc-exchange-mainnet --production-branch main
  #   npx wrangler@4.90.0 pages project create dcc-exchange-stagenet --production-branch main
  #   npx wrangler@4.90.0 pages project create dcc-exchange-testnet --production-branch main
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build and deploy (${{ needs.resolve.outputs.network }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve
    # Only auto-deploy mainnet; stagenet and testnet require manual dispatch.
    if: >-
      needs.resolve.outputs.network == 'mainnet' ||
      github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ needs.resolve.outputs.network }}
      url: ${{ needs.resolve.outputs.network == 'mainnet' && 'https://decentral.exchange' || format('https://{0}.decentral.exchange', needs.resolve.outputs.network) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Node + pnpm (canonical DCC pattern) ───────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build SDK packages ────────────────────────────────────────────────
      # Workspace packages must be compiled before the exchange can import them.
      - name: Build SDK packages
        run: pnpm --filter './packages/**' run build

      # ── Build the exchange ────────────────────────────────────────────────
      # tsc -b validates TypeScript project references; vite build produces
      # apps/exchange/dist/ with the network baked in via .env.<mode>.
      - name: Build exchange (${{ needs.resolve.outputs.build_mode }})
        run: |
          pnpm --filter ./apps/exchange exec tsc -b
          pnpm --filter ./apps/exchange exec vite build --mode "${{ needs.resolve.outputs.build_mode }}"

      - name: Verify dist/ was produced
        run: |
          if [[ ! -d apps/exchange/dist ]]; then
            echo "::error::apps/exchange/dist/ not found — vite build failed"
            exit 1
          fi
          echo "dist/ size: $(du -sh apps/exchange/dist | cut -f1)"

      # ── Deploy to Cloudflare Pages ────────────────────────────────────────
      # Required secrets (org-level or this repo's environment):
      #   CLOUDFLARE_API_TOKEN   — CF API token with Pages:Edit permission
      #   CLOUDFLARE_ACCOUNT_ID  — CF account ID
      #
      # gitHubToken enables Cloudflare to post deployment status to PRs.
      # wranglerVersion pins the CLI used inside the action.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken:    ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '4.90.0'
          command: >-
            pages deploy apps/exchange/dist
            --project-name=${{ needs.resolve.outputs.cf_project }}
            --commit-hash=${{ github.sha }}

      - name: Write deploy summary
        run: |
          echo "### Exchange deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field   | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Network | \`${{ needs.resolve.outputs.network }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | \`${{ needs.resolve.outputs.cf_project }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit  | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
