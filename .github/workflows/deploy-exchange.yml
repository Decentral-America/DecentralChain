name: Deploy Exchange

on:
  # Tag-based release trigger: deploy fires only when you explicitly push a
  # versioned tag — never on branch merges. Ship when you're ready.
  # Usage: git tag exchange/v1.2.3 && git push origin exchange/v1.2.3
  push:
    tags:
      - 'exchange/v*.*.*'

  # Manual trigger: build and deploy any network on demand.
  # Use this for staging/testnet releases and production hotfixes.
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - mainnet
          - stagenet
          - testnet

concurrency:
  # One deploy per network at a time. New runs queue behind in-flight deploys
  # for the same network rather than cancelling them.
  group: deploy-exchange-${{ github.event_name == 'workflow_dispatch' && inputs.network || 'mainnet' }}
  # Never cancel an in-flight deploy — Cloudflare Pages deploys are atomic but
  # interrupting mid-upload leaves an inconsistent deployment slot.
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write  # Required for Cloudflare Pages deployment status in PRs

jobs:
  # ── Resolve build parameters ─────────────────────────────────────────────────
  # Centralise the push/dispatch → (network, build_mode, cf_project) mapping so
  # downstream jobs can reference typed outputs rather than repeating logic.
  resolve:
    name: Resolve build parameters
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      network:    ${{ steps.params.outputs.network }}
      build_mode: ${{ steps.params.outputs.build_mode }}
      cf_project: ${{ steps.params.outputs.cf_project }}

    steps:
      - name: Compute network, build mode, and CF project name
        id: params
        env:
          INPUT_NETWORK: ${{ inputs.network }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            NETWORK="${INPUT_NETWORK}"
          else
            NETWORK="mainnet"
          fi

          case "$NETWORK" in
            mainnet)
              BUILD_MODE="production"
              CF_PROJECT="dcc-exchange-mainnet"
              ;;
            stagenet)
              BUILD_MODE="staging"
              CF_PROJECT="dcc-exchange-stagenet"
              ;;
            testnet)
              BUILD_MODE="testnet"
              CF_PROJECT="exchange-testnet"
              ;;
            *)
              echo "::error::Unknown network: $NETWORK"
              exit 1
              ;;
          esac

          echo "network=$NETWORK"        >> "$GITHUB_OUTPUT"
          echo "build_mode=$BUILD_MODE"  >> "$GITHUB_OUTPUT"
          echo "cf_project=$CF_PROJECT"  >> "$GITHUB_OUTPUT"

          echo "### Build parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter  | Value |"  >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-------|"  >> "$GITHUB_STEP_SUMMARY"
          echo "| Network    | \`$NETWORK\` |"    >> "$GITHUB_STEP_SUMMARY"
          echo "| BuildMode  | \`$BUILD_MODE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CF Project | \`$CF_PROJECT\` |" >> "$GITHUB_STEP_SUMMARY"

  # ── Build static assets ───────────────────────────────────────────────────────
  # The exchange is a React SPA (Vite). We build it here in GHA and upload
  # the dist/ directory directly to Cloudflare Pages — no Docker involved.
  # Each network maps to a separate CF Pages project, so network selection is
  # baked in at build time via the Vite --mode flag, exactly as before.
  #
  # Prerequisite: 3 CF Pages projects must exist before first deploy:
  #   npx wrangler@4.94.0 pages project create dcc-exchange-mainnet --production-branch main
  #   npx wrangler@4.94.0 pages project create dcc-exchange-stagenet --production-branch main
  #   npx wrangler@4.94.0 pages project create dcc-exchange-testnet --production-branch main
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build and deploy (${{ needs.resolve.outputs.network }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve
    # Only auto-deploy mainnet; stagenet and testnet require manual dispatch.
    if: >-
      needs.resolve.outputs.network == 'mainnet' ||
      github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ needs.resolve.outputs.network }}
      url: ${{ needs.resolve.outputs.network == 'mainnet' && 'https://decentral.exchange' || format('https://{0}.decentral.exchange', needs.resolve.outputs.network) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # ── Node + pnpm (canonical DCC pattern) ───────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version

      # ── Rust / WASM toolchain (required by packages/sdk/crypto wasm-pack build) ──
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/sdk/crypto
          cache-on-failure: true

      - name: Install wasm-pack v0.15.0
        run: |
          set -euo pipefail
          curl -fsSL \
            https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/wasm-pack.tar.gz
          echo "c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz" | sha256sum --check
          tar -xzf /tmp/wasm-pack.tar.gz -C /tmp
          mv /tmp/wasm-pack-v0.15.0-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/wasm-pack
          wasm-pack --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build SDK packages ────────────────────────────────────────────────
      # Workspace packages must be compiled before the exchange can import them.
      - name: Build SDK packages
        run: pnpm --filter './packages/**' run build

      # ── Build the exchange ────────────────────────────────────────────────
      # tsc -b validates TypeScript project references; vite build produces
      # apps/exchange/dist/ with the network baked in via .env.<mode>.
      - name: Build exchange (${{ needs.resolve.outputs.build_mode }})
        env:
          # SENTRY_AUTH_TOKEN: @sentry/vite-plugin uses this to upload source maps
          # and create the release in Sentry. The plugin no-ops when absent.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # SENTRY_RELEASE: the git tag (e.g. exchange/v1.2.3). The plugin
          # associates uploaded source maps with this release name in Sentry.
          SENTRY_RELEASE: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          pnpm --filter ./apps/exchange exec tsc -b
          pnpm --filter ./apps/exchange exec vite build --mode "${{ needs.resolve.outputs.build_mode }}"

      - name: Verify dist/ was produced
        run: |
          set -euo pipefail
          if [[ ! -d apps/exchange/dist ]]; then
            echo "::error::apps/exchange/dist/ not found — vite build failed"
            exit 1
          fi
          echo "dist/ size: $(du -sh apps/exchange/dist | cut -f1)"

      # ── Deploy to Cloudflare Pages ────────────────────────────────────────
      # Required secrets (org-level or this repo's environment):
      #   CLOUDFLARE_API_TOKEN   — CF API token with Pages:Edit permission
      #   CLOUDFLARE_ACCOUNT_ID  — CF account ID
      #
      # gitHubToken enables Cloudflare to post deployment status to PRs.
      # wranglerVersion pins the CLI used inside the action.
      - name: Check Cloudflare secrets
        id: cf-check
        env:
          CF_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "$CF_TOKEN" || -z "$CF_ACCOUNT" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — deploy skipped (infra pending)"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pre-install Wrangler (pnpm 11 requires -w flag for workspace-root installs)
        if: steps.cf-check.outputs.configured == 'true'
        run: pnpm add -w wrangler@4.94.0

      - name: Deploy to Cloudflare Pages
        if: steps.cf-check.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken:    ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '4.94.0'
          command: >-
            pages deploy apps/exchange/dist
            --project-name=${{ needs.resolve.outputs.cf_project }}
            --commit-hash=${{ github.sha }}

      - name: Write deploy summary
        run: |
          set -euo pipefail
          echo "### Exchange deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field   | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Network | \`${{ needs.resolve.outputs.network }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Project | \`${{ needs.resolve.outputs.cf_project }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit  | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
