name: zwaves

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/jvm/zwaves/**'
      - '.github/workflows/zwaves.yml'
  pull_request:
    paths:
      - 'packages/jvm/zwaves/**'
      - '.github/workflows/zwaves.yml'

env:
  NATIVE_DIR: packages/jvm/zwaves/zwaves_jni/javalib/src/main/resources/META-INF/native

jobs:
  # ── Step 1: Build native JNI library for each platform ──────────────────────
  build-native:
    name: Native lib · ${{ matrix.platform }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: amd64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            artifact: libzwaves_jni.so
            resource-path: linux64/amd64

          - platform: linux
            arch: aarch64
            os: ubuntu-latest
            rust-target: aarch64-unknown-linux-gnu
            artifact: libzwaves_jni.so
            resource-path: linux64/aarch64
            extra-packages: gcc-aarch64-linux-gnu

          - platform: linux
            arch: x86
            os: ubuntu-latest
            rust-target: i686-unknown-linux-gnu
            artifact: libzwaves_jni.so
            resource-path: linux32/x86
            extra-packages: gcc-multilib

          - platform: osx
            arch: aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact: libzwaves_jni.dylib
            resource-path: osx64/aarch64

          - platform: osx
            arch: x86_64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            artifact: libzwaves_jni.dylib
            resource-path: osx64/x86_64

          - platform: windows
            arch: amd64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact: zwaves_jni.dll
            resource-path: windows64/amd64

          - platform: windows
            arch: x86
            os: windows-latest
            rust-target: i686-pc-windows-msvc
            artifact: zwaves_jni.dll
            resource-path: windows32/x86

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cross-compilation packages (Linux cross targets)
        if: matrix.extra-packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.extra-packages }}

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: packages/jvm/zwaves/zwaves_jni

      - name: Run Rust unit tests (native arch only)
        if: matrix.arch == 'amd64' || matrix.arch == 'x86_64'
        working-directory: packages/jvm/zwaves/zwaves_jni
        run: cargo test --lib --target ${{ matrix.rust-target }}

      - name: Build native library
        working-directory: packages/jvm/zwaves/zwaves_jni
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Stage artifact for upload
        shell: bash
        run: |
          DEST="${{ env.NATIVE_DIR }}/${{ matrix.resource-path }}"
          mkdir -p "$DEST"
          rm -f "$DEST/.gitkeep"
          cp "packages/jvm/zwaves/zwaves_jni/target/${{ matrix.rust-target }}/release/${{ matrix.artifact }}" "$DEST/"

      - name: Upload native library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-lib-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.NATIVE_DIR }}/**
          retention-days: 1

  # ── Step 1b: Rust security audit (ubuntu-amd64 only) ────────────────────────
  # cargo audit checks all advisories against the RustSec advisory DB.
  # Advisories that cannot be patched (embedded sapling-crypto legacy chain)
  # are formally documented with risk assessment in deny.toml and suppressed
  # here via --ignore flags.  See deny.toml for the full rationale.
  cargo-audit:
    name: Rust Security Audit (cargo audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: packages/jvm/zwaves/zwaves_jni

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet

      - name: Run cargo audit (ignore documented unfixable advisories)
        working-directory: packages/jvm/zwaves/zwaves_jni
        run: |
          cargo audit \
            --ignore RUSTSEC-2022-0011 \
            --ignore RUSTSEC-2022-0004 \
            --ignore RUSTSEC-2020-0071
          # Suppressed advisories are formally documented with risk assessment
          # in packages/jvm/zwaves/deny.toml.  All three originate in the
          # sapling-crypto embedded dep chain that is pinned for ZK-SNARK
          # circuit compatibility; upgrading would invalidate the trusted setup.
          # RUSTSEC-2025-0141 (bincode unmaintained) is a warning only and does
          # not cause a non-zero exit.

  # ── Step 2: Java compile + test ─────────────────────────────────────────────
  build:
    name: Java 25 · Compile · Test
    runs-on: ubuntu-latest
    needs: build-native
    defaults:
      run:
        working-directory: packages/jvm/zwaves

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-lib-*
          merge-multiple: true
          path: ${{ env.NATIVE_DIR }}

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Enforce version gates + compile + test
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zwaves-surefire-reports
          path: packages/jvm/zwaves/target/surefire-reports/
          retention-days: 7

  # ── Step 3: Security audit (main/dev only) ───────────────────────────────────
  audit:
    name: Security Audit (SpotBugs + PMD + OWASP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-lib-*
          merge-multiple: true
          path: ${{ env.NATIVE_DIR }}

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run audit profile
        working-directory: packages/jvm/zwaves
        run: |
          ./mvnw --batch-mode --no-transfer-progress verify -P audit \
            -Ddependency-check.skip=true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zwaves-spotbugs-report
          path: packages/jvm/zwaves/target/spotbugs*.xml
          retention-days: 14

  # ── Step 4: SBOM (main/dev only) ─────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-lib-*
          merge-multiple: true
          path: ${{ env.NATIVE_DIR }}

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Build package + generate CycloneDX SBOM
        working-directory: packages/jvm/zwaves
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zwaves-sbom
          path: packages/jvm/zwaves/target/bom.json
          retention-days: 90
