name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        default: false
        description: Run without publishing
        type: boolean

concurrency:
  cancel-in-progress: false
  group: release

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Release workflow runs without NX Cloud access — disable cloud features
      # so nx tasks run locally instead of failing on unauthorized workspace.
      NX_NO_CLOUD: true

    steps:
      - name: Guard — enforce main branch
        if: github.ref != 'refs/heads/main'
        run: |
          set -euo pipefail
          echo "::error::Release workflow triggered from '${{ github.ref }}'. Only 'refs/heads/main' is allowed."
          exit 1

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Rust / WASM toolchain (required by packages/sdk/crypto wasm-pack build) ──
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/sdk/crypto
          cache-on-failure: true

      - name: Install wasm-pack v0.15.0
        run: |
          set -euo pipefail
          curl -fsSL \
            https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/wasm-pack.tar.gz
          echo "c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz" | sha256sum --check
          tar -xzf /tmp/wasm-pack.tar.gz -C /tmp
          mv /tmp/wasm-pack-v0.15.0-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/wasm-pack
          wasm-pack --version

      - name: Security audit
        run: pnpm audit --audit-level=moderate

      - name: Biome format
        run: pnpm exec biome format .

      - name: Biome lint
        run: pnpm nx run-many -t biome-lint --projects='packages/sdk/*'

      - name: Build
        run: pnpm nx run-many -t build --projects='packages/sdk/*'

      - name: Typecheck
        run: pnpm nx run-many -t typecheck --projects='packages/sdk/*'

      - name: Test
        run: pnpm nx run-many -t test --projects='packages/sdk/*'

      - name: Verify package exports
        run: pnpm nx run-many -t check:exports --projects='packages/sdk/*'

      - name: Verify package publishing
        run: pnpm nx run-many -t check:publint --projects='packages/sdk/*' --exclude=types

      - name: Verify bundle size
        run: pnpm nx run-many -t check:size --projects='packages/sdk/*'

      - name: Version
        run: pnpm nx release version --skip-publish ${{ inputs.dry-run && '--dry-run' || '' }}

      - name: Changelog
        run: pnpm nx release changelog --skip-publish ${{ inputs.dry-run && '--dry-run' || '' }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: pnpm nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          artifact-name: sbom-${{ github.sha }}.spdx.json
          upload-artifact: true
          upload-release-assets: false
