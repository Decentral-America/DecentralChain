name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        default: false
        description: Run without publishing
        type: boolean

concurrency:
  cancel-in-progress: false
  group: release

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Guard — enforce main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Release workflow triggered from '${{ github.ref }}'. Only 'refs/heads/main' is allowed."
          exit 1

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=moderate

      - name: Biome format
        run: pnpm exec biome format .

      - name: Biome lint
        run: pnpm nx run-many -t biome-lint --projects='packages/sdk/*,packages/ride/ts'

      - name: Typecheck
        run: pnpm nx run-many -t typecheck --projects='packages/sdk/*,packages/ride/ts'

      - name: Build
        run: pnpm nx run-many -t build --projects='packages/sdk/*,packages/ride/ts'

      - name: Test
        run: pnpm nx run-many -t test --projects='packages/sdk/*,packages/ride/ts'

      - name: Verify package exports
        run: pnpm nx run-many -t check:exports --projects='packages/sdk/*,packages/ride/ts'

      - name: Verify package publishing
        run: pnpm nx run-many -t check:publint --projects='packages/sdk/*,packages/ride/ts' --exclude=types

      - name: Verify bundle size
        run: pnpm nx run-many -t check:size --projects='packages/sdk/*,packages/ride/ts'

      - name: Version
        run: pnpm nx release version --skip-publish ${{ inputs.dry-run && '--dry-run' || '' }}

      - name: Changelog
        run: pnpm nx release changelog --skip-publish ${{ inputs.dry-run && '--dry-run' || '' }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: pnpm nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          artifact-name: sbom-${{ github.sha }}.spdx.json
          upload-artifact: true
          upload-release-assets: false
