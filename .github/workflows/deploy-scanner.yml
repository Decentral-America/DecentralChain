name: Deploy Scanner

on:
  # Tag-based release trigger: deploy fires only when you explicitly push a
  # versioned tag — never on branch merges. Ship when you're ready.
  # Usage: git tag scanner/v1.2.3 && git push origin scanner/v1.2.3
  push:
    tags:
      - 'scanner/v*.*.*'

  # Manual trigger: deploy to any network on demand.
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy'
        required: true
        default: 'mainnet'
        type: choice
        options:
          - mainnet
          - stagenet
          - testnet

concurrency:
  # One deploy per network at a time.
  group: deploy-scanner-${{ github.event_name == 'workflow_dispatch' && inputs.network || 'mainnet' }}
  # Never cancel an in-flight deploy — killing an SSH session mid-restart leaves
  # the service in a broken state. Queue the new run instead.
  cancel-in-progress: false

permissions:
  contents: read
  packages: write  # Required to push to ghcr.io
  security-events: write  # Required for infra deploy-container.yml Trivy SARIF upload

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/decentral-america/scanner

jobs:
  # ── Resolve build parameters ──────────────────────────────────────────────────
  # Scanner uses runtime env vars baked into the server /opt/dcc/secrets/<network>.env
  # file by the infra bootstrap.sh. This job just resolves which network to deploy to.
  resolve:
    name: Resolve parameters
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      network: ${{ steps.params.outputs.network }}

    steps:
      - name: Compute network
        id: params
        env:
          INPUT_NETWORK: ${{ inputs.network }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            NETWORK="${INPUT_NETWORK}"
          else
            NETWORK="mainnet"
          fi

          case "$NETWORK" in
            mainnet|stagenet|testnet) ;;
            *)
              echo "::error::Unknown network: $NETWORK"
              exit 1
              ;;
          esac

          echo "network=$NETWORK" >> "$GITHUB_OUTPUT"

          echo "### Build parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |"        >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|"        >> "$GITHUB_STEP_SUMMARY"
          echo "| Network   | \`$NETWORK\` |" >> "$GITHUB_STEP_SUMMARY"

  # ── Build and push Docker image ───────────────────────────────────────────────
  # One image serves all networks — network config is injected at container start.
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        # Authenticate to avoid anonymous pull rate-limits (100 pulls/6h) when
        # docker/build-push-action pulls node:24-alpine base image.
        # Requires: org variable DOCKERHUB_USERNAME + org secret DOCKERHUB_TOKEN.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=DCC Scanner
            org.opencontainers.image.description=DecentralChain blockchain explorer (SSR)
            org.opencontainers.image.vendor=Decentral-America

      - name: Build and push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/scanner/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SENTRY_RELEASE: git tag (e.g. scanner/v1.2.3) → becomes VITE_APP_VERSION
          # inside the Docker build so the Sentry release name matches the tag.
          build-args: |
            SENTRY_RELEASE=${{ github.ref_name }}
          # SENTRY_AUTH_TOKEN: mounted as a Docker secret so @sentry/vite-plugin can
          # upload source maps without the token appearing in any image layer.
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Write image summary
        run: |
          set -euo pipefail
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy via infra reusable workflow ───────────────────────────────────────
  # Calls Decentral-America/infra/.github/workflows/deploy-container.yml.
  # That workflow reads DEPLOY_* secrets from the infra repo's environments
  # (mainnet/stagenet/testnet) — this repo needs zero environment secrets.
  # Network-specific URLs (DCC_NODE_URL etc.) are written to the server's
  # /opt/dcc/secrets/<network>.env by the infra bootstrap.sh at provision time.
  # ─────────────────────────────────────────────────────────────────────────────
  call-deploy:
    name: Deploy (${{ needs.resolve.outputs.network }})
    needs: [resolve, build-and-push]
    # Only auto-deploy mainnet; stagenet and testnet require manual dispatch.
    # Guard: skip gracefully until SSH keys are provisioned in infra repo environments.
    # Set repository variable INFRA_DEPLOY_ENABLED=true once servers and keys are ready.
    if: vars.INFRA_DEPLOY_ENABLED == 'true' && (needs.resolve.outputs.network == 'mainnet' || github.event_name == 'workflow_dispatch')
    uses: Decentral-America/infra/.github/workflows/deploy-container.yml@a59bf8faf786c45fdb420373d5b8f07d2437e7a5 # main
    with:
      network: ${{ needs.resolve.outputs.network }}
      image:   ghcr.io/decentral-america/scanner:${{ github.sha }}
      service: scanner
    secrets: inherit
