name: List Sender Addresses
# Prints the DCC addresses derived from the load-test seed phrase for each nonce.
# Use this to find addresses that need funding before a multi-sender high-TPS run.
on:
  workflow_dispatch:
    inputs:
      sender_count:
        description: 'Number of senders to list'
        required: false
        default: '5'
        type: string

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: '1.96'

      - name: Cache Rust build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/load-tester/target
          key: load-tester-${{ runner.os }}-${{ hashFiles('apps/load-tester/Cargo.lock', 'apps/load-tester/Cargo.toml') }}
          restore-keys: load-tester-${{ runner.os }}-

      - name: Build load-tester
        working-directory: apps/load-tester
        run: cargo build --release --quiet

      - name: List sender addresses
        timeout-minutes: 2
        env:
          DCC_PRIVATE_KEY: ${{ secrets.GEN_0_SEED_PHRASE }}
        working-directory: apps/load-tester
        run: |
          echo "## Sender addresses for gen-0 seed (nonces 0-${{ inputs.sender_count || '5' }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Fund these on testnet before running multi-sender stress tests:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./target/release/load-tester \
            --chain-id "!" \
            --sender-count "${{ inputs.sender_count || '5' }}" \
            --list-senders \
            2>/dev/null | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
