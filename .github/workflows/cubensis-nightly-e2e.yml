name: Cubensis Connect — Nightly E2E

on:
  schedule:
    # 02:00 UTC every day — runs against main so failures always map to a committed state.
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions UI for on-demand E2E runs.

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  e2e:
    name: WebdriverIO E2E (Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: apps/cubensis-connect

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version

      # ── Rust / WASM toolchain (required by packages/sdk/crypto wasm-pack build) ──
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/sdk/crypto
          cache-on-failure: true

      - name: Install wasm-pack v0.15.0
        run: |
          curl -fsSL \
            https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/wasm-pack.tar.gz
          echo "c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz" | sha256sum --check
          tar -xzf /tmp/wasm-pack.tar.gz -C /tmp
          mv /tmp/wasm-pack-v0.15.0-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/wasm-pack
          wasm-pack --version
        working-directory: .

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        working-directory: .
        run: pnpm --filter './packages/**' run build

      - name: Build extension (chrome)
        run: CUBENSIS_PLATFORM=chrome NODE_ENV=production node scripts/build.mjs

      - name: Start E2E services (DCC private node + Chrome WebDriver)
        run: docker compose up dcc-private-node hub chrome --wait
        timeout-minutes: 5

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          # Points the WebdriverIO runner at the Selenium Hub started above.
          SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-videos-${{ github.run_id }}
          path: apps/cubensis-connect/test/videos/
          retention-days: 7

      - name: Stop E2E services
        if: always()
        run: docker compose down --volumes
