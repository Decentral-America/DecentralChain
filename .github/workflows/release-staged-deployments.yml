name: Release Staged Maven Deployments

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Publish all VALIDATED deployments to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch and publish VALIDATED deployments
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          TOKEN=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 -w0)
          BASE="https://central.sonatype.com/api/v1/publisher/deployment"

          publish() {
            local id=$1 name=$2
            echo -n "Publishing $name ($id)... "
            code=$(curl -s -o /tmp/pub_resp.txt -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              "${BASE}/${id}")
            body=$(cat /tmp/pub_resp.txt)
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then
              echo "✓ (HTTP $code)"
            else
              echo "✗ (HTTP $code): $body"
              return 1
            fi
          }

          publish "3e87ffa2-6c6c-4a02-86e5-2af99c9713f6" "curve25519-1.0.0"
          publish "a1bea16b-334f-40ac-af76-f5fd323bca6d" "blst-0.3.16.0"
          publish "76e0aab8-8c9c-4410-907d-bd8dcfbeaf52" "groth16-0.2.1.0"
