name: Publish Protobuf Serialization

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.6.2)'
        required: true
        default: '1.6.2'

permissions:
  contents: read

concurrency:
  group: publish-protobuf-schemas
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/_publish-maven.yml
    secrets: inherit
    with:
      package-path: packages/sdk/protobuf-schemas
      artifact-name: protobuf-schemas
      version: ${{ inputs.version }}
