version: 2
updates:
  # ── npm (pnpm workspace root) ─────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      nx-platform:
        patterns: ["nx", "@nx/*"]
      build-tools:
        patterns: ["@biomejs/*", "vite", "vitest", "esbuild", "typescript"]
      testing:
        patterns: ["@playwright/*", "@vitest/*"]

  # ── cargo (groth16 workspace) ─────────────────────────────────────────────
  # Workspace members: groth16_primitives, groth16_jni, groth16_fastcrypto.
  # The shielded-pool crates (sapling-crypto, groth16_circuit, groth16_setup,
  # groth16_node, vendor/phase2) were deleted in the 2.0 modernization.
  #
  # bellman 0.1.0 is pinned in vendor/bellman — it encodes the consensus
  # byte-format for historical groth16Verify proofs. Bumping it is a hard fork.
  # crossbeam is ignored because it is a transitive dep of vendored bellman
  # where we control the version explicitly in vendor/bellman/Cargo.toml.
  - package-ecosystem: "cargo"
    directory: "/packages/jvm/groth16"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "crossbeam"
        versions: ["*"]
      - dependency-name: "bellman"
        versions: ["*"]

  # ── cargo (sdk/crypto) ────────────────────────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/packages/sdk/crypto"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # ── cargo (sdk/protobuf-serialization) ───────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/packages/sdk/protobuf-serialization"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # ── cargo (apps/blockchain-postgres-sync) ────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/apps/blockchain-postgres-sync"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
