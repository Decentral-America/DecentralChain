dcc {
  extensions = [
    "com.decentralchain.events.BlockchainUpdates"
  ]

  blockchain-updates {
    grpc-port = 6881
    min-keep-alive = 5m
  }

  rest-api {
    cors-headers {
      # Allow all origins for local dev; set to specific domain in production
      access-control-allow-origin = "*"
    }
  }
}
