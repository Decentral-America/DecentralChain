<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Decentral Exchange — the native DEX on DecentralChain blockchain. Trade DCC pairs with zero counterparty risk." />
    <meta name="theme-color" content="#1e1e2d" />
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <!-- Web manifest -->
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Decentral Exchange" />
    <meta property="og:description" content="Trade on the native DEX — powered by DecentralChain." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="Decentral Exchange" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Decentral Exchange" />
    <meta name="twitter:description" content="Trade on the native DEX — powered by DecentralChain." />
    <meta name="twitter:image" content="/og-image.png" />
    <!-- CSP is configured via Vite server headers in vite.config.ts -->
    <!-- Preload English translations so i18next-http-backend finds them already
         in the browser cache by the time React initialises i18n. -->
    <link rel="preload" as="fetch" href="/locales/en/translation.json" crossorigin />
    <title>Decentral Exchange</title>
  </head>
  <body>
    <!--
      Loading shell — visible before React mounts and the LandingPage chunk loads.
      React's createRoot().render() replaces this content on first commit.
      No JS required: pure HTML + inline CSS, renders in < 1ms.
    -->
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1e1e2d;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" aria-label="Loading" role="img">
          <circle cx="24" cy="24" r="20" stroke="#6c63ff" stroke-width="4" stroke-linecap="round" stroke-dasharray="31.4 94.2">
            <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="0.9s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
