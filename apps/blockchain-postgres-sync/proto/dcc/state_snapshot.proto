syntax = "proto3";
package dcc;
option java_package = "io.decentralchain.protobuf.snapshot";
option csharp_namespace = "Dcc";
option go_package = "github.com/Decentral-America/node-go/pkg/grpc/generated/dcc";

import "dcc/transaction_state_snapshot.proto";

message BlockSnapshot {
  bytes block_id = 1;
  repeated TransactionStateSnapshot snapshots = 2;
}

message MicroBlockSnapshot {
  bytes total_block_id = 1;
  repeated TransactionStateSnapshot snapshots = 2;
}
