name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual dispatch: deploy to stagenet or testnet on demand.
  # Auto-deploy to mainnet happens on push to main (deploy-mainnet job).
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy (stagenet or testnet)'
        required: true
        default: 'stagenet'
        type: choice
        options:
          - stagenet
          - testnet

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build, test & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libpq-dev

      - name: Cache Cargo registry + build artefacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all-targets

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Check documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

      - name: Cache cargo tools
        id: cargo-tools-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cargo/bin/
          key: ${{ runner.os }}-cargo-tools-audit-deny-machete-v1

      - name: Install cargo-audit
        if: steps.cargo-tools-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit --deny warnings

      - name: Install cargo-deny
        if: steps.cargo-tools-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked

      - name: Dependency policy check (cargo deny)
        run: cargo deny check

      - name: Install cargo-machete
        if: steps.cargo-tools-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-machete --locked

      - name: Unused dependency check (cargo machete)
        run: cargo machete

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/decentral-america/blockchain-postgres-sync
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=DCC blockchain-postgres-sync
            org.opencontainers.image.description=Blockchain-to-PostgreSQL sync daemon for DecentralChain
            org.opencontainers.image.vendor=Decentral-America

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ── Resolve deploy network ────────────────────────────────────────────────────
  resolve:
    name: Resolve network
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    outputs:
      network: ${{ steps.network.outputs.network }}
    steps:
      - name: Determine target network
        id: network
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "network=${{ inputs.network }}" >> "$GITHUB_OUTPUT"
          else
            echo "network=mainnet" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy via infra reusable workflow ────────────────────────────────────────
  # Calls Decentral-America/infra/.github/workflows/deploy-container.yml.
  # That workflow reads DEPLOY_* secrets from the infra repo's environments
  # (mainnet/stagenet/testnet) — this repo needs zero environment secrets.
  # Runtime config (BLOCKCHAIN_UPDATES_URL, CHAIN_ID, PGHOST, PGDATABASE,
  # PGUSER, PGPASSWORD) lives in /opt/dcc/secrets/<network>.env on the server,
  # written at provision time by infra. Never stored in GitHub.
  #
  # Chain IDs: mainnet=63 ('?'), stagenet=83 ('S'), testnet=33 ('!')
  # ─────────────────────────────────────────────────────────────────────────────
  call-deploy:
    name: Deploy (${{ needs.resolve.outputs.network }})
    needs: [resolve, docker]
    uses: Decentral-America/infra/.github/workflows/deploy-container.yml@main
    with:
      network: ${{ needs.resolve.outputs.network }}
      image:   ghcr.io/decentral-america/blockchain-postgres-sync:${{ github.sha }}
      service: blockchain-postgres-sync
    secrets: inherit
