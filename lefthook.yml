min_version: 2.1.6

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx,js,jsx,json,css}'
      run: npx biome check --staged --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm typecheck
      skip:
        - merge
        - rebase
    # DCC-252: Scala format gate — runs only when packages/ride Scala/sbt files are staged.
    # Full quality gate (scalafix + compile + coverage) runs via `sbt bulletproof` in CI.
    ride-fmt:
      glob: 'packages/ride/**/*.{scala,sbt}'
      run: cd packages/ride && sbt --no-colors scalafmtAll scalafmtSbt
      stage_fixed: true
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    conventional:
      run: >-
        grep -qE
        '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
        {1}
    no-key-in-description:
      # Catches: feat(scanner): DCC-123 something  ← key belongs in parens, not after the colon
      # Correct: feat(DCC-123): something
      run: >-
        ! grep -qE
        '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)\([^)]+\)!?: DCC-[0-9]+'
        {1}
      fail_text: >-
        DCC ticket key must go inside the parentheses, not in the description.
        Wrong:   feat(scanner): DCC-123 my change
        Correct: feat(DCC-123): my change
