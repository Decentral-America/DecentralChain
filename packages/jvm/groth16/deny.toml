# packages/jvm/groth16 — cargo-deny configuration
#
# This file documents known security advisories in the groth16 Rust
# dependency tree that cannot be patched without breaking ZK-SNARK
# circuit compatibility.
#
# Previously ignored advisories that have now been resolved:
#   RUSTSEC-2022-0011, RUSTSEC-2022-0004, RUSTSEC-2020-0071 -- eliminated by
#     replacing rust-crypto with sha2 = "0.9" in sapling-crypto/Cargo.toml.
#   GHSA-8gj8-hv75-gp94 -- eliminated by vendoring bellman 0.1.0 and phase2 0.2.2
#     in vendor/ and upgrading their crossbeam dependency from 0.3 to 0.8.

[advisories]
# Vulnerability advisories cause a hard deny by default; unmaintained notices
# produce a warning only (acceptable for internal vendored deps).
version = 2
ignore = [
  # ---------------------------------------------------------------------------
  # RUSTSEC-2025-0141  bincode 1.x -- potential DoS via deeply-nested structures
  # Source:  groth16_primitives 0.1.0 --> bincode 1.3.3
  # Risk assessment:
  #   bincode is used for internal proof serialization inside groth16_primitives.
  #   No deserialization of untrusted external data occurs; all bincode-encoded
  #   payloads are produced and consumed within the same Rust binary.  The
  #   bincode2 successor is API-compatible but upgrading requires pinned
  #   Groth16 parameter re-generation.  This is tracked for the next Sapling
  #   parameter refresh sprint.  Risk: INFORMATIONAL.
  { id = "RUSTSEC-2025-0141", reason = "bincode is used only for internal proof serialization within groth16_primitives; no untrusted input deserialization; tracked for Sapling parameter refresh sprint" },
]

[licenses]
# All licenses in the groth16 Rust dep tree have been reviewed.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unlicense",
  "CC0-1.0",
]

[bans]
# Prevent duplicate crate versions (warn only -- sapling ecosystem has some).
multiple-versions = "warn"
wildcards         = "allow"

[sources]
# Only crates.io and local paths are allowed; no git deps in production.
unknown-registry = "deny"
unknown-git      = "warn"
