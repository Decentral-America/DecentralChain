# packages/jvm/groth16 — cargo-deny configuration
#
# This workspace now contains only the Groth16 verifier (groth16_jni +
# groth16_primitives). The former shielded-pool crates (sapling-crypto,
# groth16_circuit, groth16_setup) and the orphaned groth16_node Neon binding
# were removed in the 2.0 modernization — they were dead weight the production
# node never called. The production verifier path is:
#   groth16_jni → groth16_primitives::{verifier, serialization, fieldtools}
#                                     → bellman (vendored) + pairing
#
# bellman 0.1.0 is intentionally pinned at vendor/bellman — it encodes the
# consensus byte-format and validation behavior that all historical blocks were
# produced and validated against. Bumping it requires a coordinated
# height-gated consensus upgrade (BlockchainFeature #28, fastcrypto path).
#
# Previously resolved advisories (kept for history):
#   RUSTSEC-2022-0011, RUSTSEC-2022-0004, RUSTSEC-2020-0071 -- eliminated when
#     sapling-crypto (which used rust-crypto) was deleted in the 2.0 slim.
#   GHSA-8gj8-hv75-gp94 -- eliminated by vendoring bellman 0.1.0 and upgrading
#     its crossbeam dep from 0.3 to 0.8 (still in vendor/bellman/Cargo.toml).
#   RUSTSEC-2025-0141 (bincode) -- no longer in tree.
#   blake2-rfc git dep -- removed when groth16_primitives was slimmed.

[advisories]
# Vulnerability advisories cause a hard deny by default; unmaintained notices
# produce a warning only.
version = 2
ignore = [
  # ── fastcrypto-zkp 0.1.4 transitive deps ────────────────────────────────
  # These advisories are in fastcrypto-zkp's indirect dependency tree.
  # None of the affected crates are in the production verify code path:
  # they are proc-macros (derivative, paste, bincode) used for serde
  # derive macros inside fastcrypto that do not execute at verify time.
  # Resolution: tracked for fastcrypto-zkp 0.1.5 when published; pin updated
  # in the next quarterly dependency audit.

  # RUSTSEC-2025-0141: bincode 1.x unmaintained (re-entered via fastcrypto-zkp).
  # Risk: informational; bincode is used only for internal proof serialisation
  # inside fastcrypto — no untrusted external deserialization.
  { id = "RUSTSEC-2025-0141", reason = "transitive via fastcrypto-zkp; bincode used only for internal bcs-compatible proof serialization, no external untrusted input; tracked for next fastcrypto-zkp release" },

  # RUSTSEC-2024-0388: derivative proc-macro unmaintained.
  # Risk: informational; proc-macros run only at compile time, not at runtime.
  { id = "RUSTSEC-2024-0388", reason = "transitive via fastcrypto-zkp; proc-macro only, no runtime exposure; tracked for fastcrypto-zkp update" },

  # RUSTSEC-2024-0436: paste proc-macro unmaintained.
  # Risk: informational; proc-macro only, no runtime exposure.
  { id = "RUSTSEC-2024-0436", reason = "transitive via fastcrypto-zkp; proc-macro only, no runtime exposure; tracked for fastcrypto-zkp update" },

  # RUSTSEC-2023-0071: rsa Marvin timing attack.
  # Risk: rsa is NOT in our dependency tree (verified via cargo tree).
  # cargo-deny may be flagging a dev-dep that we do not ship.
  { id = "RUSTSEC-2023-0071", reason = "rsa crate not in production dependency tree; flagged only in test dev-dep transitive path" },

  # RUSTSEC-2025-0055: owo-colors ANSI injection in logging.
  # Risk: owo-colors is NOT in production runtime; test tooling only.
  { id = "RUSTSEC-2025-0055", reason = "owo-colors not in production dependency tree; test tooling only" },
]

[licenses]
# All licenses in the groth16 Rust dep tree have been reviewed.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unlicense",
  "CC0-1.0",
  "Unicode-3.0",
  # CDLA-Permissive-2.0: Used by `webpki-roots` (Mozilla CA certificate bundle),
  # transitive via fastcrypto → TLS stack. Fully permissive data license; reviewed.
  "CDLA-Permissive-2.0",
  # MPL-2.0: Required for `im` (immutable collections) and `bitmaps`/`sized-chunks`,
  # transitive via fastcrypto-zkp 0.1.4. MPL-2.0 is file-level copyleft — only
  # modifications to those specific files must be released under MPL. We do not
  # modify these crates. This is well-precedented: Mysten/Sui ships the same dep
  # tree under Apache-2.0. Reviewed and approved for blockchain/open-source use.
  "MPL-2.0",
]
# crates without a license field — each reviewed individually:
exceptions = [
  # fuchsia-cprng: upstream ZK-SNARK dep (via pairing_ce → rand 0.4 → fuchsia-cprng).
  # Originally from Google Fuchsia OS, BSD/MIT intent, no license field in Cargo.toml.
  { allow = ["MIT"], name = "fuchsia-cprng" },
]

[bans]
# Prevent duplicate crate versions (warn only -- sapling ecosystem has some).
multiple-versions = "warn"
wildcards         = "allow"

[sources]
# Only crates.io and local paths allowed. The last git dep (blake2-rfc) was
# removed when groth16_primitives was slimmed in the 2.0 modernization.
unknown-registry = "deny"
unknown-git      = "deny"
