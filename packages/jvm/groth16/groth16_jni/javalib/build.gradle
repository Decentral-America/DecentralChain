plugins {
    id "java-library"
    id "maven-publish"
    id "signing"
    id "io.github.gradle-nexus.publish-plugin" version "1.3.0"
}

repositories {
    mavenCentral()
}

def pr() { project.findProperty('pr').toString() ?: "" }

def ref() { project.findProperty('ref').toString().replaceAll('^.+/(.+)$', '$1') ?: "" }

ext {
    baseVersion = "0.2.1"

    publishingType = {
        if (pr()?.isNumber()) "snapshot" else if (ref() == "v${baseVersion}") "staging" else "prohibited"
    }

    artifactVersion = {
        if (pr()?.isNumber()) "${baseVersion}-${pr()}-SNAPSHOT" else baseVersion
    }
}

group = "io.decentralchain"
archivesBaseName = "groth16"
version = artifactVersion()

dependencies {
    testImplementation 'junit:junit:4.13.1'
}

test {
    useJUnit()
    maxHeapSize = '1G'
}

tasks.register('printVersion') {
    doLast {
        println version
    }
}

tasks.register('publishingType') {
    doLast {
        println publishingType()
    }
}

task sourceJar(type: Jar) {
    archiveClassifier = 'sources'
    from (sourceSets.main.allSource) {
        exclude 'META-INF/native'
    }
}

javadoc {
    options {
        encoding "UTF-8"
        charSet 'UTF-8'
    }
}

task javadocJar(type: Jar, dependsOn: javadoc) {
    archiveClassifier = 'javadoc'
    from javadoc.destinationDir
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifact sourceJar
            artifact javadocJar

            pom {
                name = 'groth16'
                description = 'groth16verify (bls12, bn256) for Java'
                packaging = 'jar'
                url = 'https://github.com/Decentral-America/DCC'
                licenses {
                    license {
                        name.set("MIT License")
                        url.set("LICENSE")
                    }
                }
                developers {
                    developer {
                        id = "snjax"
                        name = "Igor Gulamov"
                        email = "igor.gulamov@gmail.com"
                    }
                }
                scm {
                    connection.set("scm:git:git://github.com/Decentral-America/DCC.git")
                    developerConnection.set("scm:git:git@github.com:Decentral-America/DCC.git")
                    url.set("https://github.com/Decentral-America/DCC")
                }
            }
        }
    }
}

signing {
    useInMemoryPgpKeys(gpgKey, gpgPassphrase)
    sign publishing.publications.mavenJava
}

nexusPublishing {
    repositories {
        sonatype()
    }
}
