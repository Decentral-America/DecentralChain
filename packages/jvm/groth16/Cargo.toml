[workspace]
members = [
  "groth16_primitives",
  "groth16_circuit",
  "groth16_jni",
  "sapling-crypto",
  "groth16_setup",
  "groth16_node/native"
]

[profile.release]
lto = true
panic = 'abort'
codegen-units = 1

[profile.dev]
lto = true
panic = 'abort'
codegen-units = 8

[patch.crates-io]
bellman = { path = "vendor/bellman" }
phase2 = { path = "vendor/phase2" }
