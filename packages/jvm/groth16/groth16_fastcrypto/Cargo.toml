[package]
name = "groth16_fastcrypto"
version = "0.1.0"
authors = ["DecentralChain <dev@decentralchain.io>"]
edition = "2021"
license = "MIT"
description = "Modern Groth16 BLS12-381 verifier backed by fastcrypto-zkp (Mysten Labs, audited). Activated via BlockchainFeature(28) — replaces bellman-0.1 for new blocks while preserving the legacy verifier for historical re-validation below the activation height."

[lib]
crate-type = ["rlib"]

[dependencies]
# fastcrypto-zkp 0.1.4 — Mysten Labs audited Groth16 verifier.
# Audit report: https://www.commonprefix.com/static/clients/mysten/mysten_fastcrypto_groth16_audit.pdf
# Uses blst 0.3.16 for BLS12-381 (same version as packages/jvm/blst — deduplicated in build).
fastcrypto-zkp = "0.1.4"

[dev-dependencies]
hex = "0.4"
test-case = "3.2.1"
# Test vectors are hardcoded bytes in lib.rs — no ark dev-deps needed.
# Single-input vectors: generated with ark-groth16 0.4.0, StdRng::seed_from_u64(0).
# Two-input vectors:    generated with ark-groth16 0.4.0, StdRng::seed_from_u64(1).
# This removes the transitive tracing-subscriber 0.2.x (Dependabot alert #154)
# that came via ark-relations 0.4.0 → tracing-subscriber "^0.2" (std feature).
# To regenerate: temporarily restore ark deps, run the print_*_vectors #[ignore] tests,
# update the constants below, then remove ark deps again.
