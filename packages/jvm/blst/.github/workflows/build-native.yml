# build-native.yml — Cross-platform native library compilation for io.decentralchain:blst
#
# Builds libblst.so / libblst.dylib / blst.dll for all 6 bundled platforms from
# the supranational/blst C source at the upstream tag configured below.
#
# Trigger:
#   workflow_dispatch: manual — run when upgrading blst upstream version.
#   After successful run, commit the updated native binaries and bump pom.xml.
#
# Output:
#   Compiled native libraries committed back to:
#     src/main/resources/supranational/blst/<OS>/<arch>/<libname>
#
# Platforms:
#   Linux   amd64    (libblst.so)
#   Linux   aarch64  (libblst.so)
#   Linux   x86      (libblst.so)
#   macOS   aarch64  (libblst.dylib)
#   macOS   x86_64   (libblst.dylib)
#   Windows amd64    (blst.dll)

name: Build Native blst Libraries

on:
  workflow_dispatch:
    inputs:
      blst_tag:
        description: "supranational/blst git tag to build from"
        required: true
        default: "v0.3.16"
      commit_result:
        description: "Commit compiled libraries back to repo"
        required: true
        type: boolean
        default: true

# Principle of least privilege: all jobs are read-only by default.
# The commit-natives job explicitly elevates to contents: write.
permissions: read-all

env:
  BLST_TAG: ${{ github.event.inputs.blst_tag }}
  JAVA_VERSION: "25"

jobs:
  # ── Linux (amd64 + aarch64 + x86) via Docker cross-compile ───────────────────
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04          # Native x86_64
            cc: gcc
            cxx: g++
            extra_cflags: ""
            extra_security_flags: "-fcf-protection=full"    # Intel CET: IBT + shadow stack (x86_64)
            resource_dir: Linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm      # Native ARM64 — no cross-compile needed.
            cc: gcc                       # uname -m = aarch64 → build.sh selects ARM64 asm.
            cxx: g++
            extra_cflags: ""
            extra_security_flags: "-mbranch-protection=standard"  # ARM64 BTI + PAC-RET
            resource_dir: Linux/aarch64
          - arch: x86
            runner: ubuntu-24.04
            cc: gcc
            cxx: g++
            extra_cflags: "-m32"
            extra_security_flags: "-fcf-protection=full"    # Intel CET: IBT + shadow stack (i686+)
            resource_dir: Linux/x86

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          PKGS="swig"
          [[ "${{ matrix.arch }}" == "x86" ]] && PKGS="$PKGS gcc-multilib g++-multilib"
          sudo apt-get install -y --no-install-recommends $PKGS

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Clone blst ${{ env.BLST_TAG }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$BLST_TAG" \
            https://github.com/supranational/blst.git /tmp/blst-src

      - name: Verify blst ${{ env.BLST_TAG }} source integrity
        run: |
          set -euo pipefail
          ACTUAL=$(git -C /tmp/blst-src rev-parse HEAD)
          case "${BLST_TAG}" in
            "v0.3.16") EXPECTED="e7f90de551e8df682f3cc99067d204d8b90d27ad" ;;
            *) echo "WARNING: no pinned SHA for ${BLST_TAG} — update workflow on tag upgrade" && exit 0 ;;
          esac
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "FATAL: blst ${BLST_TAG} commit hash mismatch — possible supply-chain attack"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "OK blst ${BLST_TAG}: $ACTUAL"

      - name: Build libblst.a
        run: |
          set -euo pipefail
          cd /tmp/blst-src
          CC=${{ matrix.cc }} CFLAGS="-fPIC -fvisibility=hidden ${{ matrix.extra_cflags }}" \
            ./build.sh -fvisibility=hidden ${{ matrix.extra_cflags }}
        env:
          CC: ${{ matrix.cc }}

      - name: Generate SWIG wrapper
        run: |
          set -euo pipefail
          mkdir -p /tmp/blst-swig-out/supranational/blst
          cd /tmp/blst-src
          swig -c++ -java -package supranational.blst \
               -outdir /tmp/blst-swig-out/supranational/blst \
               -o /tmp/blst-swig-out/blst_wrap.cpp \
               "$GITHUB_WORKSPACE/blst-dcc.swg"

      - name: Compile libblst.so
        run: |
          set -euo pipefail
          JNI_MD="$JAVA_HOME/include/linux"
          ${{ matrix.cxx }} -shared \
              -o /tmp/libblst.so \
              -fPIC -fvisibility=hidden \
              ${{ matrix.extra_cflags }} \
              -I"$JAVA_HOME/include" \
              -I"$JNI_MD" \
              -I/tmp/blst-src \
              -I/tmp/blst-src/bindings \
              -O2 -fstack-protector-strong -D_FORTIFY_SOURCE=3 \
              -fstack-clash-protection -D_GLIBCXX_ASSERTIONS \
              -ftrivial-auto-var-init=zero \
              ${{ matrix.extra_security_flags }} \
              -Wall -Wno-unused-function \
              -Wl,-Bsymbolic,-z,relro,-z,now,-z,noexecstack \
              /tmp/blst-swig-out/blst_wrap.cpp \
              /tmp/blst-src/libblst.a
          strip --strip-unneeded /tmp/libblst.so
          file /tmp/libblst.so
          ls -la /tmp/libblst.so

      - name: Install native library
        run: |
          set -euo pipefail
          cp /tmp/libblst.so \
             "src/main/resources/supranational/blst/${{ matrix.resource_dir }}/libblst.so"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-linux-${{ matrix.arch }}
          path: src/main/resources/supranational/blst/${{ matrix.resource_dir }}/libblst.so
          retention-days: 1

  # ── macOS (aarch64 + x86_64) ─────────────────────────────────────────────────
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-15          # Apple Silicon (M-series)
            clang_arch: arm64
            resource_dir: Mac/aarch64
          - arch: x86_64
            runner: macos-13          # Intel
            clang_arch: x86_64
            resource_dir: Mac/x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install SWIG
        run: brew install swig

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Clone blst ${{ env.BLST_TAG }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$BLST_TAG" \
            https://github.com/supranational/blst.git /tmp/blst-src

      - name: Verify blst ${{ env.BLST_TAG }} source integrity
        run: |
          set -euo pipefail
          ACTUAL=$(git -C /tmp/blst-src rev-parse HEAD)
          case "${BLST_TAG}" in
            "v0.3.16") EXPECTED="e7f90de551e8df682f3cc99067d204d8b90d27ad" ;;
            *) echo "WARNING: no pinned SHA for ${BLST_TAG} — update workflow on tag upgrade" && exit 0 ;;
          esac
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "FATAL: blst ${BLST_TAG} commit hash mismatch — possible supply-chain attack"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "OK blst ${BLST_TAG}: $ACTUAL"

      - name: Build libblst.a
        run: |
          set -euo pipefail
          cd /tmp/blst-src
          CFLAGS="-fPIC -fvisibility=hidden" ./build.sh -fvisibility=hidden

      - name: Generate SWIG wrapper
        run: |
          set -euo pipefail
          mkdir -p /tmp/blst-swig-out/supranational/blst
          cd /tmp/blst-src
          swig -c++ -java -package supranational.blst \
               -outdir /tmp/blst-swig-out/supranational/blst \
               -o /tmp/blst-swig-out/blst_wrap.cpp \
               "$GITHUB_WORKSPACE/blst-dcc.swg"

      - name: Compile libblst.dylib
        run: |
          set -euo pipefail
          JNI_MD="$JAVA_HOME/include/darwin"
          c++ -dynamiclib \
              -o /tmp/libblst.dylib \
              -fPIC -fvisibility=hidden \
              -arch ${{ matrix.clang_arch }} \
              -I"$JAVA_HOME/include" \
              -I"$JNI_MD" \
              -I/tmp/blst-src \
              -I/tmp/blst-src/bindings \
              -O2 -fstack-protector-strong -ftrivial-auto-var-init=zero -Wall -Wno-unused-function \
              /tmp/blst-swig-out/blst_wrap.cpp \
              /tmp/blst-src/libblst.a
          strip -x /tmp/libblst.dylib
          file /tmp/libblst.dylib
          ls -la /tmp/libblst.dylib

      - name: Install native library
        run: |
          set -euo pipefail
          cp /tmp/libblst.dylib \
             "src/main/resources/supranational/blst/${{ matrix.resource_dir }}/libblst.dylib"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-macos-${{ matrix.arch }}
          path: src/main/resources/supranational/blst/${{ matrix.resource_dir }}/libblst.dylib
          retention-days: 1

  # ── Windows amd64 (MinGW cross-compile from Linux) ────────────────────────────
  #
  # Using Linux + MinGW instead of windows-2022 + MSVC because blst's build.sh
  # produces GAS-syntax assembly (build/assembly.S) which MSVC cl.exe cannot
  # assemble.  The MSVC path (build/win64/*.asm, ml64.exe) requires assembling
  # ~20 individual MASM files, while MinGW handles build.sh identically to Linux.
  # The resulting DLL is statically linked (no MSVC/MinGW runtime dependency).
  # On x86-64 Windows, JNICALL (stdcall) == cdecl — Linux JNI headers are safe.
  build-windows:
    name: Windows amd64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install MinGW cross-compiler and SWIG
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 swig

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Clone blst ${{ env.BLST_TAG }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$BLST_TAG" \
            https://github.com/supranational/blst.git /tmp/blst-src

      - name: Verify blst ${{ env.BLST_TAG }} source integrity
        run: |
          set -euo pipefail
          ACTUAL=$(git -C /tmp/blst-src rev-parse HEAD)
          case "${BLST_TAG}" in
            "v0.3.16") EXPECTED="e7f90de551e8df682f3cc99067d204d8b90d27ad" ;;
            *) echo "WARNING: no pinned SHA for ${BLST_TAG} — update workflow on tag upgrade" && exit 0 ;;
          esac
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "FATAL: blst ${BLST_TAG} commit hash mismatch — possible supply-chain attack"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "OK blst ${BLST_TAG}: $ACTUAL"

      - name: Build libblst.a (MinGW)
        run: |
          set -euo pipefail
          cd /tmp/blst-src
          CC=x86_64-w64-mingw32-gcc \
            CFLAGS="-fPIC -fvisibility=hidden" \
            ./build.sh -fvisibility=hidden

      - name: Generate SWIG wrapper
        run: |
          set -euo pipefail
          mkdir -p /tmp/blst-swig-out/supranational/blst
          cd /tmp/blst-src
          swig -c++ -java -package supranational.blst \
               -outdir /tmp/blst-swig-out/supranational/blst \
               -o /tmp/blst-swig-out/blst_wrap.cpp \
               "$GITHUB_WORKSPACE/blst-dcc.swg"

      - name: Compile blst.dll
        run: |
          set -euo pipefail
          # Use Linux JNI headers — on x86-64 Windows, JNICALL (stdcall) == cdecl.
          # No ABI difference on 64-bit; the Linux jni_md.h (JNICALL = empty) is correct.
          x86_64-w64-mingw32-g++ -shared \
              -o /tmp/blst.dll \
              -fPIC -fvisibility=hidden \
              -I"$JAVA_HOME/include" \
              -I"$JAVA_HOME/include/linux" \
              -I/tmp/blst-src \
              -I/tmp/blst-src/bindings \
              -O2 -Wall -Wno-unused-function \
              -fstack-clash-protection -D_GLIBCXX_ASSERTIONS \
              -ftrivial-auto-var-init=zero \
              -static-libstdc++ -static-libgcc \
              -Wl,--dynamicbase,--nxcompat,--high-entropy-va \
              /tmp/blst-swig-out/blst_wrap.cpp \
              /tmp/blst-src/libblst.a
          x86_64-w64-mingw32-strip --strip-debug /tmp/blst.dll
          file /tmp/blst.dll
          ls -la /tmp/blst.dll

      - name: Install native library
        run: |
          set -euo pipefail
          cp /tmp/blst.dll \
             "src/main/resources/supranational/blst/Windows/amd64/blst.dll"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-windows-amd64
          path: src/main/resources/supranational/blst/Windows/amd64/blst.dll
          retention-days: 1

  # ── Commit all compiled libraries back to the repo ───────────────────────────
  commit-natives:
    name: Commit native libraries
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-24.04
    if: ${{ github.event.inputs.commit_result == 'true' }}
    permissions:
      contents: write   # required to push committed native libraries back to the repo
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/native-artifacts

      - name: Install native libraries
        run: |
          set -euo pipefail
          BASE="src/main/resources/supranational/blst"

          cp /tmp/native-artifacts/native-linux-amd64/libblst.so    "$BASE/Linux/amd64/libblst.so"
          cp /tmp/native-artifacts/native-linux-aarch64/libblst.so  "$BASE/Linux/aarch64/libblst.so"
          cp /tmp/native-artifacts/native-linux-x86/libblst.so      "$BASE/Linux/x86/libblst.so"
          cp /tmp/native-artifacts/native-macos-aarch64/libblst.dylib "$BASE/Mac/aarch64/libblst.dylib"
          cp /tmp/native-artifacts/native-macos-x86_64/libblst.dylib  "$BASE/Mac/x86_64/libblst.dylib"
          cp /tmp/native-artifacts/native-windows-amd64/blst.dll    "$BASE/Windows/amd64/blst.dll"

      - name: Verify all 6 libraries updated
        run: |
          set -euo pipefail
          echo "=== Native library inventory ==="
          find src/main/resources/supranational/blst -type f | sort | while read f; do
            echo "$f: $(file "$f")"
          done

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/supranational/blst/
          git diff --staged --stat
          git commit -m "chore(DCC-265): compile native blst $BLST_TAG for 6 platforms [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
        env:
          BLST_TAG: ${{ env.BLST_TAG }}
