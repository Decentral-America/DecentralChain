name: Run tests

on:
  push:
    branches: [main, dev, master]
    paths:
      - '**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main, dev, master]
    paths:
      - '**'
      - '.github/workflows/tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  run_tests:
    name: Build & Test (Java 25)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B verify -Dmaven.test.failure.ignore=true

      - name: Publish Surefire report
        if: always()
        uses: scacap/action-surefire-report@3dacff26879cd2a7f2160d101254032a3707fe6f  # v1.12.0
        with:
          check_name: Test Report
          fail_if_no_tests: false
