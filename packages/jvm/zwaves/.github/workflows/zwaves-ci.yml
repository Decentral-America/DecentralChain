# ──────────────────────────────────────────────────────────────────────────────
# zwaves CI
#
# This workflow runs on every push/PR that touches packages/jvm/zwaves/.
#
# Steps:
#   1. Build native JNI libraries for all supported platforms (matrix job)
#   2. Compile + test Java library against the native libs (Java 25, Linux/amd64)
#   3. SpotBugs + FindSecBugs + PMD security audit
#   4. Upload JaCoCo coverage report as artifact
# ──────────────────────────────────────────────────────────────────────────────

name: zwaves CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'packages/jvm/zwaves/**'
      - '.github/workflows/zwaves-ci.yml'
  pull_request:
    paths:
      - 'packages/jvm/zwaves/**'

env:
  NATIVE_DIR: packages/jvm/zwaves/zwaves_jni/javalib/src/main/resources/META-INF/native

jobs:
  # ── Step 1: Build native JNI library for each platform ──────────────────────
  build-native:
    name: Native lib · ${{ matrix.platform }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64
          - platform: linux
            arch: amd64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            artifact: libzwaves_jni.so
            resource-path: linux64/amd64

          # Linux aarch64 (cross-compiled)
          - platform: linux
            arch: aarch64
            os: ubuntu-latest
            rust-target: aarch64-unknown-linux-gnu
            artifact: libzwaves_jni.so
            resource-path: linux64/aarch64
            extra-packages: gcc-aarch64-linux-gnu

          # Linux x86 32-bit (cross-compiled)
          - platform: linux
            arch: x86
            os: ubuntu-latest
            rust-target: i686-unknown-linux-gnu
            artifact: libzwaves_jni.so
            resource-path: linux32/x86
            extra-packages: gcc-multilib

          # macOS Apple Silicon (aarch64)
          - platform: osx
            arch: aarch64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact: libzwaves_jni.dylib
            resource-path: osx64/aarch64

          # macOS Intel (x86_64)
          - platform: osx
            arch: x86_64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            artifact: libzwaves_jni.dylib
            resource-path: osx64/x86_64

          # Windows amd64
          - platform: windows
            arch: amd64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact: zwaves_jni.dll
            resource-path: windows64/amd64

          # Windows x86
          - platform: windows
            arch: x86
            os: windows-latest
            rust-target: i686-pc-windows-msvc
            artifact: zwaves_jni.dll
            resource-path: windows32/x86

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cross-compilation packages (Linux cross targets)
        if: matrix.extra-packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.extra-packages }}

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: packages/jvm/zwaves

      - name: Run Rust unit tests (amd64 / x86_64 only — native runner arch)
        if: matrix.arch == 'amd64' || matrix.arch == 'x86_64'
        working-directory: packages/jvm/zwaves/zwaves_jni
        run: cargo test --lib --target ${{ matrix.rust-target }}

      - name: Build native library
        working-directory: packages/jvm/zwaves/zwaves_jni
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Stage artifact for upload
        shell: bash
        run: |
          DEST="${{ env.NATIVE_DIR }}/${{ matrix.resource-path }}"
          mkdir -p "$DEST"
          # Remove .gitkeep placeholder before adding real lib
          rm -f "$DEST/.gitkeep"
          cp "packages/jvm/zwaves/target/${{ matrix.rust-target }}/release/${{ matrix.artifact }}" "$DEST/"
          echo "Staged: $DEST/${{ matrix.artifact }}"

      - name: Upload native library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: native-lib-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.NATIVE_DIR }}/**
          retention-days: 1

  # ── Step 2: Java compile + test + audit ─────────────────────────────────────
  verify:
    name: Java 25 · Compile · Test · Audit
    runs-on: ubuntu-latest
    needs: build-native
    defaults:
      run:
        working-directory: packages/jvm/zwaves

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: native-lib-*
          merge-multiple: true
          path: ${{ env.NATIVE_DIR }}

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # ── Compile + tests ─────────────────────────────────────────────────────
      - name: Compile and run tests
        run: ./mvnw --batch-mode verify

      # ── Security audit ──────────────────────────────────────────────────────
      - name: Security audit
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -n "$NVD_API_KEY" ]; then
            ./mvnw --batch-mode verify -P audit -DnvdApiKey="$NVD_API_KEY"
          else
            echo "NVD_API_KEY not set — skipping OWASP dependency-check"
            ./mvnw --batch-mode verify -P audit -Ddependency-check.skip=true
          fi

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zwaves-jacoco-report
          path: packages/jvm/zwaves/target/site/jacoco/
          retention-days: 14
