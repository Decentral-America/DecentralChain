# ──────────────────────────────────────────────────────────────────────────────
# blst-java CI
#
# This workflow runs on every push/PR that touches packages/jvm/blst-java/.
# The monorepo root CI also invokes this package via Nx (nx run blst-java:verify).
#
# Steps:
#   1. Compile + test (Java 25 on Linux/amd64 — matches Linux/amd64/libblst.so)
#   2. SpotBugs + FindSecBugs + PMD (audit profile, OWASP dep-check when key present)
#   3. Upload JaCoCo HTML report as artifact
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'packages/jvm/blst-java/**'
      - '.github/workflows/blst-java-ci.yml'
  pull_request:
    paths:
      - 'packages/jvm/blst-java/**'

defaults:
  run:
    working-directory: packages/jvm/blst-java

jobs:
  verify:
    name: Compile · Test · Audit (Java 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # ── Compile + tests ─────────────────────────────────────────────────────
      - name: Compile and run tests
        run: ./mvnw --batch-mode verify

      # ── Security audit ──────────────────────────────────────────────────────
      # SpotBugs + FindSecBugs + PMD run unconditionally.
      # OWASP dependency-check requires an NVD API key to avoid rate limits;
      # it is skipped when the repository secret is absent (e.g. fork PRs).
      - name: Security audit
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -n "$NVD_API_KEY" ]; then
            ./mvnw --batch-mode verify -P audit -DnvdApiKey="$NVD_API_KEY"
          else
            echo "NVD_API_KEY not set — skipping OWASP dependency-check"
            ./mvnw --batch-mode verify -P audit -Ddependency-check.skip=true
          fi

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: jacoco-report
          path: packages/jvm/blst-java/target/site/jacoco/
          retention-days: 14
