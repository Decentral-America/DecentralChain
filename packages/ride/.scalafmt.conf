version = "3.11.1"
runner.dialect = scala3
align.preset = more
maxColumn = 120
rewrite.rules = [AvoidInfix, RedundantBraces, SortImports]

# Parser.scala uses fastparse's implicit-context macro pattern:
#   .map(o => { implicit (c: fastparse.P[Any]) => ... })
# scalafmt 3.11.1 cannot parse this Scala 3 form of anonymous implicit parameter
# and exits with a parse error. Exclude the file from formatting — it is managed
# manually. See KNOWN_ISSUES KNOWN-6.
project.excludePaths = ["glob:**/lang/v1/parser/Parser.scala"]
