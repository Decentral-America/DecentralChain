rules = [
  OrganizeImports,
  RemoveUnused,
  NoValInForComprehension,
  ProcedureSyntax
]

OrganizeImports.groupedImports = AggressiveMerge
OrganizeImports.removeUnused   = true
# Preserve Scala 3 wildcard import syntax (import X.* not import X._)
OrganizeImports.targetDialect  = Scala3
# Keep existing selector order within braces — scalafmt SortImports uses
# symbols-first/lowercase-first ordering that differs from OrganizeImports Ascii.
# Setting Keep prevents the two tools from conflicting with each other.
OrganizeImports.importSelectorsOrder = Keep
