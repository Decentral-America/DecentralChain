# Scalafix configuration for Scala.js subprojects.
#
# Semantic rules (OrganizeImports, RemoveUnused) require the scalac compiler to
# emit SemanticDB files. Scala.js does not produce SemanticDB output, so only
# syntactic rules are enabled here.
#
# JVM subprojects use .scalafix.conf (the default, which includes semantic rules).
rules = [
  NoValInForComprehension,
  ProcedureSyntax
]
