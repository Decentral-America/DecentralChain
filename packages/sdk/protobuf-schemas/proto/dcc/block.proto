syntax = "proto3";
package dcc;
option java_package = "io.decentralchain.protobuf.block";
option csharp_namespace = "DecentralChain";
option go_package = "github.com/Decentral-America/protobuf-schemas/pkg/grpc/generated/dcc";

import "dcc/transaction.proto";

message Block {
    message Header {
        message ChallengedHeader {
            int64 base_target = 1;
            bytes generation_signature = 2;
            repeated uint32 feature_votes = 3;
            int64 timestamp = 4;
            bytes generator = 5;
            int64 reward_vote = 6;
            bytes state_hash = 7;
            bytes header_signature = 8;
            FinalizationVoting finalization_voting = 9;
        }

        int32 chain_id = 1;
        bytes reference = 2;
        int64 base_target = 3;
        bytes generation_signature = 4;
        repeated uint32 feature_votes = 5;
        int64 timestamp = 6;
        int32 version = 7;
        bytes generator = 8;
        int64 reward_vote = 9;
        bytes transactions_root = 10;
        bytes state_hash = 11;
        ChallengedHeader challenged_header = 12;
        FinalizationVoting finalization_voting = 13;
        // Blake2b-256 of sorted (address ++ blsPublicKey) pairs committed for the next generation period.
        // Non-empty only at period boundary blocks (height % generationPeriodLength == 0).
        bytes committed_generators_hash = 14;
    }

    Header header = 1;
    bytes signature = 2;
    repeated SignedTransaction transactions = 3;
}

message MicroBlock {
    int32 version = 1;
    bytes reference = 2;
    bytes updated_block_signature = 3;
    bytes sender_public_key = 4;
    repeated SignedTransaction transactions = 5;
    bytes state_hash = 6;
    FinalizationVoting finalization_voting = 7;
}

message SignedMicroBlock {
    MicroBlock micro_block = 1;
    bytes signature = 2;
    bytes total_block_id = 3;
}

message EndorseBlock {
    int32 endorser_index = 1;
    bytes finalized_block_id = 2;
    uint32 finalized_block_height = 3;
    bytes endorsed_block_id = 4;
    bytes signature = 5; // BLS
}

message FinalizationVoting {
    repeated int32 endorser_indexes = 1;
    int32 finalized_block_height = 2;
    bytes aggregated_endorsement_signature = 3; // BLS
    repeated EndorseBlock conflict_endorsements = 4;
}

// --- T2 HotStuff BFT fast-finality (see CONSENSUS.md) ---
// Wire messages for the pipelined 3-phase HotStuff engine over the committed-generator committee.
// GATED behind dcc.hotstuff.enabled (default off); testnet-first. The exact field semantics
// (what is signed, phase transitions) are subject to consensus-design review, and the wire format
// may evolve until mainnet enablement (which is gated on external audit + testnet soak).
enum HotStuffPhase {
    HOTSTUFF_PHASE_UNSPECIFIED = 0;
    HOTSTUFF_PHASE_PREPARE = 1;
    HOTSTUFF_PHASE_PRE_COMMIT = 2;
    HOTSTUFF_PHASE_COMMIT = 3;
}

// A single committed generator's vote for a block in a given view and phase.
// Signature is a BLS signature over the canonical encoding of (view, phase, block_id, block_height).
message HotStuffVote {
    uint32 view = 1;              // monotonic round/view number
    HotStuffPhase phase = 2;
    bytes block_id = 3;           // block being voted on
    uint32 block_height = 4;
    int32 voter_index = 5;        // index in the committed generator set for the period
    bytes signature = 6;          // BLS
}

// Aggregated proof that >= 2/3 of committed stake voted for (view, phase, block_id).
// aggregated_signature is the BLS aggregate of the individual HotStuffVote signatures from signer_indexes.
message QuorumCertificate {
    uint32 view = 1;
    HotStuffPhase phase = 2;
    bytes block_id = 3;
    uint32 block_height = 4;
    repeated int32 signer_indexes = 5;   // committed generators whose votes are aggregated
    bytes aggregated_signature = 6;      // BLS aggregate
}

// A leader's HotStuff proposal: extend `block_id` at `view`, justified by `justify` (the highQC the
// leader is extending). The `justify` linkage is what lets replicas verify the prepare→pre-commit→
// commit chain (the 3-chain commit rule) — without it the safety rule has no justification to check.
message HotStuffProposal {
    uint32 view = 1;
    bytes block_id = 2;
    QuorumCertificate justify = 3;
}
