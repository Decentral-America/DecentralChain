packages:
  - 'packages/sdk/*'
  - 'packages/ride/lang/js'
  - 'packages/ride/repl/js'
  - 'packages/ride/ts'
  - 'packages/jvm/*'
  - 'apps/*'
  - 'e2e'

catalog:
  '@arethetypeswrong/cli': 0.18.3
  '@size-limit/preset-small-lib': 12.1.0
  '@types/node': 25.9.1
  '@vitest/coverage-v8': 4.1.8
  jsdom: 29.1.1
  publint: 0.3.21
  size-limit: 12.1.0
  tsdown: 0.22.1
  vitest: 4.1.8

# pnpm v11: non-auth .npmrc settings are ignored; declare them here instead.
engineStrict: true
saveExact: true

allowBuilds:
  '@bufbuild/buf': false
  '@connectrpc/connect': false
  '@connectrpc/connect-node': false
  '@evilmartians/lefthook': false
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  core-js-pure: true
  edgedriver: true
  esbuild: false
  geckodriver: true
  lefthook: false
  libpq: true
  nx: false
  sharp: true
  workerd: false

overrides:
  esbuild: '>=0.28.1'
  '@xmldom/xmldom': '>=0.9.10'
  axios: '>=1.16.0'
  # tmp@0.2.6 is vulnerable (GHSA-7c78-jf6q-g5cm); 0.2.7 patches it
  tmp: '>=0.2.7'
  # form-data@<4.0.6 has CRLF injection (GHSA-hmw2-7cc7-3qxx)
  form-data: '>=4.0.6'
  # @babel/core<=7.29.0 arbitrary file read via sourceMappingURL (GHSA-4x5r-pxfx-6jf8)
  '@babel/core': '>=7.29.6'
  # vite@7.3.3 is vulnerable (GHSA-fx2h-pf6j-xcff, GHSA-v6wh-96g9-6wx3); scoped to
  # vite-node to avoid conflicting with our direct dep at vite@8.x
  'vite-node>vite': '7.3.5'
  basic-ftp: '>=5.3.1'
  brace-expansion: '>=5.0.6'
  defu: '>=6.1.5'
  fast-xml-parser: '>=5.7.0'
  follow-redirects: '>=1.16.0'
  ip-address: '>=10.1.1'
  lodash: '>=4.18.1'
  # Scoped to express: blanket >=0.1.13 resolved to 8.x (different API), breaking express v4.
  # CVE fix: keep 0.1.x for express (where ReDoS is low-risk — routes are dev-defined),
  # allow react-router to use 8.x naturally.
  express>path-to-regexp: '~0.1.13'
  picomatch: '>=4.0.4'
  postcss: '>=8.5.15'
  qs: '>=6.15.2'
  typescript: '6.0.3'
  ws: '>=8.20.1'
  yaml: '>=2.8.3'
  yauzl: '^3.2.1'

# Suppress the cyclic workspace dependency warning.
# node-api ↔ transactions: transactions lists node-api as a peerDependency;
# node-api lists transactions in devDependencies for test fixtures only.
# This is intentional – the cycle is test-only and causes no runtime issues.
ignoreWorkspaceCycles: true

# pnpm supply-chain policy: packages published within ~1 day fail the
# minimumReleaseAge lockfile check. List only entries that are genuinely
# within the cutoff window; remove them once the package has aged past it.
minimumReleaseAgeExclude:
  - '@sentry-internal/browser-utils@10.56.0'
  - '@sentry-internal/feedback@10.56.0'
  - '@sentry-internal/replay-canvas@10.56.0'
  - '@sentry-internal/replay@10.56.0'
  - '@sentry/browser@10.56.0'
  - '@sentry/core@10.56.0'
  - '@sentry/react@10.56.0'
  - cytoscape@3.34.0

# @visx 3.12.0 (latest stable) declares react peerDep as "^16||^17||^18".
# The packages work correctly with React 19 — the peerDeps declaration just
# hasn't been updated upstream. Allow React 19 explicitly.
peerDependencyRules:
  allowedVersions:
    '@visx/group>react': '19'
    '@visx/shape>react': '19'
