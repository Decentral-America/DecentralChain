packages:
  - 'packages/sdk/*'
  - 'packages/ride/lang/js'
  - 'packages/ride/repl/js'
  - 'packages/ride/ts'
  - 'packages/jvm/*'
  - 'packages/e2e-blockchain'
  - 'apps/*'
  - 'e2e'

catalog:
  '@arethetypeswrong/cli': 0.18.4
  '@size-limit/preset-small-lib': 12.1.0
  '@types/node': 26.1.0
  '@vitest/coverage-v8': 4.1.9
  jsdom: 29.1.1
  publint: 0.3.21
  size-limit: 12.1.0
  tsdown: 0.22.3
  vitest: 4.1.9

# pnpm v11: non-auth .npmrc settings are ignored; declare them here instead.
engineStrict: true
saveExact: true

# Fail installs if a dependency uses "catalog:" but isn't declared above,
# instead of silently falling back to whatever version pnpm would otherwise pick.
catalogMode: strict

allowBuilds:
  '@bufbuild/buf': false
  '@connectrpc/connect': false
  '@connectrpc/connect-node': false
  '@evilmartians/lefthook': false
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  core-js-pure: true
  edgedriver: true
  esbuild: false
  geckodriver: true
  lefthook: false
  libpq: true
  nx: false
  sharp: true
  workerd: false

overrides:
  # jsdom@29 requires undici@^7 internal paths (wrap-handler.js, etc.) which were
  # removed in undici v8. Stay on ^7.x until jsdom@30+ ships with undici v8 support.
  # admin-dashboard removed its direct undici dep (Node 24 native fetch covers all usage).
  undici: "^7.0.0"
  esbuild: '>=0.28.1'
  '@xmldom/xmldom': '>=0.9.10'
  # axios <1.18.0: NO_PROXY 0.0.0.0 bypass, prototype-pollution auth/request-construction
  # gadgets, Node adapter proxy-after-interceptor-clone (GHSA advisories, several HIGH/MEDIUM).
  axios: '>=1.18.0'
  # sharp <0.35.0 inherits several libvips CVEs (CVE-2026-33327/33328/35590/35591).
  sharp: '>=0.35.0'
  # tmp@0.2.6 is vulnerable (GHSA-7c78-jf6q-g5cm); 0.2.7 patches it
  tmp: '>=0.2.7'
  # form-data@<4.0.6 has CRLF injection (GHSA-hmw2-7cc7-3qxx)
  form-data: '>=4.0.6'
  # morgan@<=1.10.1 has log forging via unneutralized control chars in :remote-user (GHSA-4vj7-5mj6-jm8m)
  morgan: '>=1.11.0'
  # @babel/core<=7.29.0 arbitrary file read via sourceMappingURL (GHSA-4x5r-pxfx-6jf8)
  '@babel/core': '>=7.29.6'
  basic-ftp: '>=5.3.1'
  # brace-expansion <5.0.7: DoS via exponential-time expansion of consecutive
  # non-expanding {} groups.
  brace-expansion: '>=5.0.7'
  defu: '>=6.1.5'
  # fast-xml-parser <5.10.1: repeated DOCTYPE declarations reset entity expansion limits.
  fast-xml-parser: '>=5.10.1'
  follow-redirects: '>=1.16.0'
  ip-address: '>=10.1.1'
  lodash: '>=4.18.1'
  # Scoped to express: blanket >=0.1.13 resolved to 8.x (different API), breaking express v4.
  # CVE fix: keep 0.1.x for express (where ReDoS is low-risk — routes are dev-defined),
  # allow react-router to use 8.x naturally.
  express>path-to-regexp: '~0.1.13'
  picomatch: '>=4.0.4'
  postcss: '>=8.5.15'
  qs: '>=6.15.2'
  typescript: '6.0.3'
  ws: '>=8.20.1'
  yaml: '>=2.8.3'
  yauzl: '^3.2.1'

# Suppress the cyclic workspace dependency warning.
# node-api ↔ transactions: transactions lists node-api as a peerDependency;
# node-api lists transactions in devDependencies for test fixtures only.
# This is intentional – the cycle is test-only and causes no runtime issues.
ignoreWorkspaceCycles: true

# pnpm supply-chain policy: packages published within ~1 day fail the
# minimumReleaseAge lockfile check. List only entries that are genuinely
# within the cutoff window; remove them once the package has aged past it.
minimumReleaseAgeExclude:
  - '@sentry-internal/browser-utils@10.56.0'
  - '@sentry-internal/feedback@10.56.0'
  - '@sentry-internal/replay-canvas@10.56.0'
  - '@sentry-internal/replay@10.56.0'
  - '@sentry/browser@10.56.0'
  - '@sentry/core@10.56.0'
  - '@sentry/react@10.56.0'
  - cytoscape@3.34.0
  - '@mui/core-downloads-tracker@9.2.0'
  - '@mui/icons-material@9.2.0'
  - '@mui/material@9.2.0'
  - '@mui/private-theming@9.2.0'
  - '@mui/system@9.2.0'
  - '@mui/utils@9.2.0'

# @visx v4 declares peerDep "^18 || ^19" — no workaround needed.
peerDependencyRules: {}
