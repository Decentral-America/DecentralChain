packages:
  - 'packages/*'
  - 'apps/*'

catalog:
  '@arethetypeswrong/cli': 0.18.2
  '@size-limit/preset-small-lib': 12.1.0
  '@types/node': 25.6.0
  '@vitest/coverage-v8': 4.1.5
  jsdom: 29.1.1
  publint: 0.3.19
  size-limit: 12.1.0
  tsdown: 0.21.10
  vitest: 4.1.5

# pnpm v11: non-auth .npmrc settings are ignored; declare them here instead.
engineStrict: true
saveExact: true

allowBuilds:
  '@bufbuild/buf': false
  '@evilmartians/lefthook': false
  '@parcel/watcher': true
  '@swc/core': true
  core-js-pure: true
  edgedriver: true
  electron: false
  electron-winstaller: true
  esbuild: false
  geckodriver: true
  lefthook: false
  libpq: true
  nx: false

overrides:
  '@xmldom/xmldom': '>=0.9.10'
  axios: '>=1.16.0'
  basic-ftp: '>=5.3.1'
  brace-expansion: '>=5.0.5'
  defu: '>=6.1.5'
  fast-xml-parser: '>=5.7.0'
  follow-redirects: '>=1.16.0'
  ip-address: '>=10.1.1'
  lodash: '>=4.18.1'
  path-to-regexp: '>=0.1.13'
  picomatch: '>=4.0.4'
  postcss: '>=8.5.10'
  typescript: '$typescript'
  yaml: '>=2.8.3'
  yauzl: '^3.2.1'

# Suppress the cyclic workspace dependency warning.
# node-api-js ↔ transactions: transactions lists node-api-js as a peerDependency;
# node-api-js lists transactions in devDependencies for test fixtures only.
# This is intentional – the cycle is test-only and causes no runtime issues.
ignoreWorkspaceCycles: true
