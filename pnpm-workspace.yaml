packages:
  - 'packages/sdk/*'
  - 'packages/ride/lang/js'
  - 'packages/ride/repl/js'
  - 'packages/ride/ts'
  - 'packages/jvm/*'
  - 'apps/*'

catalog:
  '@arethetypeswrong/cli': 0.18.2
  '@size-limit/preset-small-lib': 12.1.0
  '@types/node': 25.9.1
  '@vitest/coverage-v8': 4.1.7
  jsdom: 29.1.1
  publint: 0.3.21
  size-limit: 12.1.0
  tsdown: 0.22.0
  vitest: 4.1.7

# pnpm v11: non-auth .npmrc settings are ignored; declare them here instead.
engineStrict: true
saveExact: true

allowBuilds:
  '@bufbuild/buf': false
  '@connectrpc/connect': false
  '@connectrpc/connect-node': false
  '@evilmartians/lefthook': false
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  core-js-pure: true
  edgedriver: true
  esbuild: false
  geckodriver: true
  lefthook: false
  libpq: true
  nx: false

overrides:
  '@xmldom/xmldom': '>=0.9.10'
  axios: '>=1.16.0'
  basic-ftp: '>=5.3.1'
  brace-expansion: '>=5.0.6'
  defu: '>=6.1.5'
  fast-xml-parser: '>=5.7.0'
  follow-redirects: '>=1.16.0'
  ip-address: '>=10.1.1'
  lodash: '>=4.18.1'
  path-to-regexp: '>=0.1.13'
  picomatch: '>=4.0.4'
  postcss: '>=8.5.15'
  qs: '>=6.15.2'
  typescript: '6.0.3'
  ws: '>=8.20.1'
  yaml: '>=2.8.3'
  yauzl: '^3.2.1'

# Suppress the cyclic workspace dependency warning.
# node-api ↔ transactions: transactions lists node-api as a peerDependency;
# node-api lists transactions in devDependencies for test fixtures only.
# This is intentional – the cycle is test-only and causes no runtime issues.
ignoreWorkspaceCycles: true

minimumReleaseAgeExclude:
  - '@vitest/coverage-v8@4.1.7'
  - '@vitest/expect@4.1.7'
  - '@vitest/mocker@4.1.7'
  - '@vitest/pretty-format@4.1.7'
  - '@vitest/runner@4.1.7'
  - '@vitest/snapshot@4.1.7'
  - '@vitest/spy@4.1.7'
  - '@vitest/utils@4.1.7'
  - vitest@4.1.7
  - vite@8.0.14
  - knip@6.14.2
  - hono@4.12.23
  - nx@22.7.4
  - '@nx/devkit@22.7.4'
  - '@nx/vitest@22.7.4'
  - '@hookform/resolvers@5.4.0'
  - '@nx/nx-darwin-arm64@22.7.4'
  - '@nx/nx-darwin-x64@22.7.4'
  - '@nx/nx-freebsd-x64@22.7.4'
  - '@nx/nx-linux-arm-gnueabihf@22.7.4'
  - '@nx/nx-linux-arm64-gnu@22.7.4'
  - '@nx/nx-linux-arm64-musl@22.7.4'
  - '@nx/nx-linux-x64-gnu@22.7.4'
  - '@nx/nx-linux-x64-musl@22.7.4'
  - '@nx/nx-win32-arm64-msvc@22.7.4'
  - '@nx/nx-win32-x64-msvc@22.7.4'
  - '@nx/js@22.7.4'
  - '@nx/workspace@22.7.4'

# @visx 3.12.0 (latest stable) declares react peerDep as "^16||^17||^18".
# The packages work correctly with React 19 — the peerDeps declaration just
# hasn't been updated upstream. Allow React 19 explicitly.
peerDependencyRules:
  allowedVersions:
    '@visx/group>react': '19'
    '@visx/shape>react': '19'
